body:
  text: 藏楞嚴會堂司預備香燭如儀躬稟書記製疏與啓建禮同預出圖帳半月日前和會有音聲兄弟為楞嚴頭維那引詣方丈問訊次到庫司人事皆請點心維那光伴至期堂司行者挂牌報寮巡廊鳴板鳴僧堂前鐘集衆依圖位立拈香出班侍者捧合次立班西堂次兩班拈香不借香大衆大展三拜尅期取證非常事也今以香燭礙不拜非法維那白佛宣疏至右伏以住持跪爐度爐進合禮與佛誕同疏了楞嚴頭喝楞嚴會上佛菩薩三聲衆和了起爾時世尊云舉呪諷畢維那回向云上來諷經功德回向真如實際莊嚴無上佛果菩提四恩等報三有齊資云云十方三世一切云云旦望藏殿祝壽外楞嚴會却當祝壽却係維那回向每日普回向偈書揭兩邊令初心者易見滿散楞嚴頭須結呪心維那宣疏禮與啓建同古法放參後山門首諷誦真歇和尚住徑山謂衆不專誠則在粥罷每日堂司行者覆維那首座庫司方丈諸頭首巡廊鳴板三下鳴僧堂前鐘大衆集大殿依圖位立諷誦普回向偈真歇和尚自製信知名行尊宿一舉四海一律也白佛偈妙湛總持不動尊首楞嚴王世希有銷我億劫顛倒想不歷僧祇獲法身仰冀洪慈俯垂昭鑒某州某寺住持某今月十五日伏值本師釋迦如來大和尚結制之辰預於十三日恭就大佛寶殿啓建楞嚴勝會營備香華燈燭以伸供養比丘衆諷誦大佛頂萬行首楞嚴神咒稱揚聖號所集功德獻神位了右伏以云普回向偈上來現前比丘衆諷誦楞嚴祕密呪回向護法衆龍天土地伽藍諸聖造三途八難俱離苦四恩三有盡霑恩國界安寧兵革銷風調雨順民康樂一衆重修希勝進十地頓超無難事山門鎮靜絶非虞檀信皈依增福慧十方三世一切佛諸尊菩薩摩訶薩摩訶般若波羅蜜右語啓建右伏目湧寶光於無見頂相有化佛之宣揚建勝幢於室羅筏城銷摩登之幻妄永嚴祕典誓畢弘持屬長期之安居爰開端於此日同聲敷暢林木池沼皆演法音一利普資蠢動含靈俱蒙饒益恭願聖天子永嚴睿算過大椿一萬六千給孤氏允輔昌朝慶奕棄光明盛大海衆了單傳之旨祇園集永固之祥但某甲下情無任激切屏營之至謹疏年月散灝氣凌空菩提場九旬制滿香風散曉首楞嚴萬行功圓與十方如來持此呪心故一衆比丘得全道力敬將殊利仰畣恩休本師釋迦如來大和尚伏顧普扇真風盡掃清於魔壘雱施法雨滋暢茂於焦枯樂至化以無為傳正宗而有永云云楞嚴勝會圖閏衆寮結夏四月初間寮元排經匱圖茶湯圖戒臘牌入寮資次牌淨髮牌依戒分排經匱分四桉頭人多則小戒者共匱或老者自占兩匱令小戒者共匱非法也夏中具行茶湯瓶盞圖兄弟有結緣者隨意書名結衆人緣也堂司出圖帳後粥罷衆人和南時出圖於穿堂諸圖牌諸方具有常式餘衆寮楞嚴四月十二日午後堂司行者覆方丈兩班諸寮挂牌報衆諷經寮元掃灑寮內外預具狀請闔寮尊衆特為湯鋪設照牌小座湯照牌觀音前供養上下間香燭預煎湯先請小座湯特為寮主副寮行瓶盞兄弟楞嚴頭請寮長光伴揖入座揖香揖湯寮元親送方丈湯分送諸寮湯小座湯了鳴寮前大板寮長大衆入座預請維那侍者光伴揖入座寮元對面寮長位分手光伴四桉大衆位寮主副寮分桉行禮揖坐揖香揖湯三巡畢寮長進爐前謝湯了鳴寮前板三下退座兩班入寮首座與都寺燒香歸班位立寮元門外右立伺迎住持入寮炷香畢舉楞嚴呪回向了送住持出門七月十二日散禮同前狀式守寮比丘某右某啓取今晚就寮煎湯一中特為合寮尊衆聊旌結制之儀伏望衆慈同垂光降謹狀年月日守寮比丘某狀可漏狀請合寮尊衆禪師守寮比丘某甲謹封回向妙湛總持不動尊首楞嚴王世希有銷我億劫顛倒想不歷僧祇獲法身某州某寺旃檀林守寮比丘某甲今月十五日恭遇本師釋迦如來大和尚結制之辰預於今辰營備供儀以伸供養集比丘衆諷誦大佛頂萬行首楞嚴神呪稱揚聖號所集殊勳先用祝延今上皇帝聖壽萬安次伸回向真如實際莊嚴無上佛果菩提祝貢護法諸天大權真宰三界萬靈十方聖衆住持本命星官僧衆建生乾象嶽瀆山川府城當境近遠廟貌看望神明當山土地列匝寺位先願皇風永扇帝道遐昌佛日增輝法輪常轉次冀山門鎮靜中外咸安火盜公私諸緣吉慶現前僧衆修行有序進道無魔般若智以現前菩提心而不退四恩普報三有齊資法界有情同圓種智十方三世一切成新挂搭入寮茶入寮後照例納部寮錢候寮元輪排當何日點茶挂牌報衆左書云齊退某甲上坐點茶須備好香具威儀候同日點茶人先挂鉢出堂預集衆寮前下間列立聞下堂槌鳴茶頭即鳴寮前大板揖迎大衆歸寮各依元排圖位立定隨入門裏一字排立問訊揖衆坐又問訊各進爐前兩兩燒香人多中爐四人退步須詳緩又一字列問訊復進四板頭問訊退仍一字列問訊而立謂之揖香鳴寮內小板二下行茶遍瓶須從穿堂而入問訊進四板頭問訊退一字問訊而立鳴小板一下收盞衆下地立定寮元出爐前對點茶人謝茶代衆人謝也衆人就位同時問訊謝畢寮元復位再各分四版頭問訊謝衆臨屈𮞏相恭敬之義蓋僧堂點茶特為亦三巡也衆仍一字問訊鳴大板三下大衆和南而散寮元令茶頭請點茶衆人喫茶免者非禮也歲入夏戒臘茶入寮茶畢逐日依戒具名點茶禮並同前律挂草單大方叢林三月一日出草單止挂搭堂司依戒排寫僧數堂司行者先呈首座次呈方丈兩班備卓子筆硯陳列僧堂前或衆寮前凡三日或有差誤望自改正或涉關係詳稟維那方便撿察不許私讐惱亂大衆毀壞叢林法也草單式清衆戒臘威音王戒陳如尊者堂頭和尚至元年戒某甲上座並依戒次排寫了右具如前恐有差誤望自改正伏幸衆悉今日日堂司某甲具呂出圖帳草單定已依戒寫楞嚴念誦巡堂被位鉢位圖戒臘牌惟鉢位圖分十六板頭論名位高下輪排定已預具草本與首座謀議呈方丈看過僉押圖內庶免臨時喧爭諸圖正本令堂司行者一一呈方丈首座兩班惟鉢位圖呈單寮蒙堂前資寮浴佛日並陳佛殿前令衆通知被鉢位圖又須先出調排被鉢位圖當日早粥未過堂時僧堂前後門貼批子用燭照之下堂圖列堂前批式粥罷排被鉢位伏幸衆悉堂司某甲白陽戒臘牌堂司侍司衆寮預依戒臘寫牌於十四日午後堂司牌列僧堂前上間侍者列法堂下間衆寮列寮內各有卓袱香燭供列大衆各炷香展拜畢仍各收持雲方丈小座湯前輩四節講行近惟結夏一次兄弟恃強位爭高下因而止之叢林蔑聞良可嘆也住持當在夏前上堂委曲勉諭俾𮞏相恭敬六和共聚按式有三座第一座分二出東堂西堂首座光伴第二座四出兩班耆舊頭首一出知事二出西班耆舊三出東班耆舊四出西堂光伴第三座位多分六出本山辦事諸方辦事首座光伴隨職高下分坐職同者次之侍司預備草圖呈方丈議定略有差池各須容忍至日依名勝書照牌午後備卓袱作一二三座陳列𥨊堂下間東西堂前堂都寺請客侍者各詣寮觸拜請之免則稟云堂頭和尚請今晚就寢堂特為獻湯餘頭首諸寮方丈客頭行者稟云方丈和尚參前拜請就寢堂特為獻湯寢堂釘挂排位秉燭裝香竟客頭行者覆侍者次覆方丈鳴鼓初座客集侍者迎揖住持接敘寒溫入位立定侍者特為人前巡揖坐問訊坐已歸中燒香一炷往特為人前揖香問訊歸中立鳴板二下行湯復進特為人前揖湯問訊歸中燒光伴香鳴板一下收盞鳴鼓三下退座第二座客集迎入位立兩侍者上下相望巡問訊揖坐燒香一炷分位頭巡揖香揖湯燒光伴香收盞鳴鼓三下退座展具謝湯免則觸禮每座同第三座客集迎接行禮並同前此座位多分位頭巡問訊須要倫序庶雅禮法騰僧堂特為湯四月十四日齊退庫司客頭行者具湯榜伴袱爐燭上首知事詣方丈請湯進住持前插香展具云今晚就雲堂特為首座大衆點湯伏望和尚慈悲特垂降重二展寒溫觸禮三拜住持畣一拜免禮則觸拜稟請而退即帶客頭行者到首座寮人力放柈卓上都寺進前插香首座還香知事展具勢免則觸拜稟云今晚就雲堂特為首座大衆點湯伏望慈悲特垂光降以榜呈首座接已就令客頭付供頭貼僧堂前下間客頭隨覆云庫司拜請湯罷就座藥石次頭首寮耆舊蒙堂諸寮衆寮僧堂前各挂點湯牌一一請已僧堂前排照牌首座住持對面設位上下安大衆牌令供頭排特為罣罳卓椅搭席碗楪菜盞匙筯差行者守直特為人湯土地堂念誦畢即鳴庫堂前齊鼓一通大衆歸鉢位頭首一班歸前板知事隨入揖首座離位揖次頭首上位送首座歸特為位問訊龕後右出迎住持入堂供頭緩鳴前堂鍾七下知事送入位問訊轉身特為人前問訊右出從首座板頭巡問訊一匝出外堂先下間至上間歸堂中立問訊衆坐進前燒香次上下間外堂歸堂蓋合已即往特為人前問訊右出住持前問訊巡堂問訊一匝及外堂歸中問訊側立鳴堂前鍾二下先進特為人湯行大衆湯瓶出歸中問訊往特為人前問訊右出聖僧前大展三拜巡堂一匝出外堂引全班入住持前行禮初展云此日粗湯特沐和尚降重下情不勝感激之至二展云即日孟夏謹時恭惟和尚尊候起居萬福即觸禮三拜住持畣一拜復位知事一班從聖僧厨後轉右徑出堂前上手依次第排立首座隨右出相對觸禮一拜謝湯復入從厨後轉左入位知事歸中燒香一炷而退堂司行者喝云請大衆下鉢行者進住持特為人卓大衆展鉢已行藥石食畢鳴鼓三下退座不鳴下堂鍾侍者列知事板外俟住持出堂問訊隨出衆散餘節並同此禮惟冬節湯罷行果子方行藥石榜式庫司今晚就雲堂點湯一中特為首座大衆聊旌結制之儀伏望衆慈同垂光降今月日庫司比丘某甲敬白作七行書字如小錢素紙華箋不拘致結制行禮四月十五日清早侍者曾辦事人小師行者皆當插香禮拜若見僧堂前出免人事榜頭諸人不必早到方丈人事住持到諸殿堂行香方丈客頭放僧堂前衆寮蒙堂四寮挂上堂牌報衆頭首并耆舊單寮覆云粥了方丈和尚上堂結座時住持詳說行禮始末一遍令知云下座先與東堂人事次與西堂人事觸禮三拜人事罷與知事人事兩展三拜次與首座大衆人事兩展三拜人事了知事先歸庫司首座領大衆詣庫司人事觸禮三拜人事罷首座歸僧堂前上間後堂首座領大衆歸僧堂前下間與首座人事觸禮三拜人事了依念誦圖立定首座領衆入堂巡堂依位立定首座禮謝大衆觸禮三拜次知事入堂燒香一炷大展三拜巡堂一匝知事禮謝大衆觸禮三拜出堂住持入堂燒香一炷大展三拜巡堂一匝歸位與大衆人事觸禮三拜然後大衆普同作禮次第俟巡寮下座客頭行者即進香几爐燭一字前列先東堂人事次西堂人事次知事一班進前插香初展詞云此際安居獲依巾錫切仗和尚法力資持無諸難事一展詞云即日孟夏謹時恭惟堂頭和尚尊候起居萬福即觸禮三拜住持畣一拜云此者得同安居亦冀法力資持無諸難事知事一班歸庫司讓先行禮者為接首座大衆故也首座領衆進前插香兩展三拜次蒙堂四寮插香兩展三拜詞語並與知事同每展住持畣拜次道舊鄉人法眷人事插香展拜畢方丈客頭行者進罣罳椅子住持即趺坐侍者一班進前插香九拜次辦事小師插香九拜今三拜者為妨隨衆非法也次參頭行者領衆行者插香禮三拜若冬年節寮前老郎方丈轎番直廳供過人㒒等皆當聲喏參拜首座領大衆詣庫司人事知事門候接入庫堂爐前問訊對觸三拜詞云聖制斯臨獲同安居惟仗道力資持無諸難事下情不勝感激之至知