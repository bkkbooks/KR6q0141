body:
  text: 國百丈龜鏡文夫兩桂垂陰一華現瑞自爾叢林之設要之本為眾僧是以開示眾僧故有長老表儀眾僧故有首座荷負眾僧故有監院調和眾僧故有維那供養眾僧故有典座為眾僧作務故有直歲為眾僧出納故有庫頭為眾僧典翰墨故有書狀為眾僧守護聖教故有藏主為眾僧迎待檀越故有知客為眾僧請召故有侍者為眾僧看守衣鉢故有寮主為眾僧供侍湯藥故有堂主為眾僧洗濯故有浴主水頭為眾僧禦寒故有炭頭爐頭為眾僧乞丐故有街坊化主為眾僧執勞故有園頭磨頭莊主為眾僧滌除故有淨頭為眾僧給侍故有淨人所以行道之緣十分備足資身之具百色現成萬事無憂一心為道世間尊貴物外優閑清淨無為眾僧為㝡迴念多人之力寧不知恩報恩晨參暮請不舍寸陰所以報長老也尊卑有序舉止安詳所以報首座也外遵法令內守規繩所以報監院也六和共聚水乳相參所以報維那也為成道業故應受此食所以報典座也安處僧房護惜什物所以報直歲也常住之物一毫無犯所以報庫頭也手不把筆如救頭然所以報書狀也明牕靜桉古教照心所以報藏主也韜光晦迹不事追陪所以報知客也居必有常請必先到所以報侍者也一瓶一鉢處眾如山所以報寮主也寧心病苦粥藥隨宜所以報堂主也輕徐靜默不昧水因所以報浴主水頭也緘言拱手退己讓人所以報炭頭爐頭也忖己德行全缺應供所以報街坊化主也計功多少量彼來處所以報園頭磨頭莊主也酌水運籌知慚惜愧所以報淨頭也寬而易從簡而易事所以報淨人也是以叢林之下道業惟新上上之機一生取辦中流之士長養聖胎至如未悟心源時中亦不虗弃是真僧寶為世福田近為末世之津梁畢證二嚴之極果若或叢林不治法輪不轉非長老所以為眾也三業不調四儀不肅非首座所以率眾也容眾之量不寬愛眾之心不厚非監院所以護眾也修行者不安敗群者不去非維那所以悅眾也六味不精三德不給非典座所以奉眾也寮舍不修什物不備非直歲所以安眾也畜積常住減尅眾僧非庫頭所以贍眾也書狀不工文字滅裂非書狀所以飾眾也几桉不嚴喧煩不息非藏主所以待眾也憎貧愛富重俗輕僧非知客所以贊眾也禮貌不恭尊卑失序非侍者所以命眾也打疊不勤守護不謹非寮主所以居眾也不閑供侍惱亂病人非堂主所以恤眾也湯水不足寒暖失宜非浴主水頭所以浣眾也預備不前眾人動念非爐頭炭頭所以向眾也臨財不公宣力不盡非街坊化主之所以供眾也地有遺利人無全功非園頭磨頭莊主所以代眾也懶墮併除諸緣不具非淨頭所以事眾也禁之不止命之不行非淨人所以順眾也如其眾僧輕師慢法取性隨緣非所以報長老也坐臥參差去就乖角非所以報首座也意輕王法不顧叢林非所以報監院也上下不和鬪諍堅固非所以報維那也貪婪美膳毀訾麤飡非所以報典座也居處受用不思後人非所以報直歲也多貪利養不恤常住非所以報庫頭也事持筆硯馳騁文章非所以報書狀也慢易金文看尋外典非所以報藏主也追陪俗士交結貴人非所以報知客也遺忘召請久坐眾僧非所以報侍者也以己妨人慢藏悔盜非所以報寮主也多嗔少喜不順病緣非所以報堂主也桶杓作聲用水無節非所以報浴主水頭也身利溫暖有妨眾人非所以報爐頭炭頭也不念修行安然受供非所以報街坊化主也飽食終日無所用心非所以報園頭磨頭莊主也涕唾墻壁狼藉東司非所以報淨頭也專尚威儀宿無善教非所以報淨人也盖以旋風千帀尚有不周但知舍短從長共辦出尺瑞反寅之事所冀獅子窟中盡成獅子旃檀林下純是旃檀令斯後五百年再覩靈山之會然則法門興廢繫在僧徒僧是福田所應奉重僧重則法重僧輕則法輕內護既嚴外護必謹設使粥飯主人一期主化叢林執士偶爾當權常宜敬侍同袍不得妄自尊大若也貢高我慢私事公酬萬事無常豈能長保一朝歸眾何面相看因果無差恐難迴避僧為佛子應供無殊天上人間咸所恭敬二時粥飯理合精豐四事供需無令闕少世尊二千年遺蔭蓋覆兒孫白毫光一分功德受用不盡但知奉眾不可憂貧僧無凡聖通會十方既曰招提悉皆有分豈可妄生分別輕厭客僧旦過寮三朝權住盡禮供承僧堂前蹔爾求齋等心供養俗客尚猶照管僧家忍不逢迎若無有限之心自有無窮之福僧門和合上下同心互有短長相盖覆家中醜惡莫使外聞雖然於事無傷畢竟減人瞻仰如獅子身中蟲自食獅子肉非天魔外道所能壞也若欲道風不墜佛日常明壯祖域之光輝補皇朝之聖化願以斯文為龜鏡焉有住持佛祖傳持延洪慧命軌範三界開鑿人天明向上事轉大法輪居金粟如來方丈之位得善現尊者長老之名入室陞堂告香普說世出世間法如法說行說俱到名實相當舉古明今師承有據或單提直截對接上根或設化隨機誘勸中下成就勝緣權衡縱奪致若行道說法之暇勾稽錢穀簿書豐儉隨宜供眾修造雖曰世間餘事古今亦號難齊苟能兼濟斯謂全才不及此者竭力運謀修造盡心供眾安僧列職任賢庶毋曠役斯謂三等住持良非細事焚修祈禱貴在專誠臨眾閑居無宜慢易叢林之設老病為先照拂矜怜尤須介念方來高士加禮送迎率身以先無事不辦如密庵披衣夜臥代先師持戒克振家聲地藏指石說心與弟子投機得大智慧此皆千古典刑佛法重任也虞前堂表率叢林人天眼目分座說法開鑿後昆喫粥飯赴茶湯𮨇後瞻前訓兄弟行典刑中規合矩坐禪領眾悉有條章齋粥精粗分付執事亡僧後事撿察主行赴眾稍違傳語下肩唱食方來請益委曲開示之繩繩百世豈細事哉如靈樹之有雲門圓悟之有大慧名位烏可輕任者耶陶後堂位居後板輔贊宗風軌則莊端晚生標格行叢林事訓責兄弟屬在前堂如闕前堂仍後堂板送鉢位別日上堂說及却轉前板插單唱食打板坐禪眾寮前第三下板絕歸堂燒香一炷即上被位坐禪既攝前堂餘事一體唐都監寺山門重任貴在得人百丈監院幹辦公私今都寺是也大剎多職書記方任荷負貴得翰墨清新黼黻宗社朝夕勤於香火歲計攷於簿書參辭官員賀謝檀越出納収支準俻供眾齋粥常運勝心待物不可輕易行㒒有犯量過行移罪亡重科誠告聽恕莊庫職務擇舉公心尊賢容眾和氣靄然供眾缺乏竭力運謀修造事務盡心成美同事才德推揚行止涉私密諭或大過累及山門密覆住持毋聞清眾方便處置萬不失一也二時撥忙赴堂他營語及同事公私纖粟分明種種愛護常住如楊岐之佐慈明石牕之輔宏智異日遇緣即宗人天模範盛大光明未可量也弔書記聲名清雅翰墨典嚴製文須合古規發語當為新鑑悚動觀聽輝映林泉若曰佛祖慧命豈在茲乎黃龍南和尚遇雲峰悅禪師指見慈明方決大事謀西江華藏遁庵會下充書記代赴張循王府陞座到府門問曰書記若會禪家間自有教授謀即歸寺焚却所畜文字徑造天童默耕此道凡十年不出僧堂方了大事後住雪豆至天童法道大振任重致遠叢林共知民藏主掌握金文嚴設几桉常備湯茶香燭延迎兄弟看經初入經堂先白堂主同到藏司相看送歸桉位對觸禮一拜此古法也今人物駢集藏列東西務在馳名所職何事直須宗乘洞達聖教該通點對出入經卷書填殘缺字畫焙拂補粘盡心成美亦為報佛之恩名寶無辜矣伐維那梵語維那唐言悅眾叢林典則一一舉行位列東班職居清要送往迎來禮須勤重病僧將息令得其宜兄弟麤心委曲調護挂搭歸堂撿示度牒上簾収帳閉爐打扇當計寒暖亡僧衣物務要公明念誦舉經詳緩合節二時打鎚堂前鐘鳴離位入堂左手上香一炷退兩步半問訊合掌而入槌邊立先看逐日回向神示鐘絕打槌一下眾展鉢再鳴槌一下合掌默回向當日神明聲微緩引至清淨法身處左手作盖勢側按槌墪右手打槌高不過五寸聲絕方下槌急緩合度首座唱食至有無字朝龕轉身退立板頭食徧進前打鎚一下合掌至門限裏轉身面聖僧問訊合掌歸鉢位若施主齋僧遍食槌後從龕後轉左邊朝首座問訊復轉打槌一下請施財若楞嚴會化香燭或有它緣戒臈簿假簿當送過客司并請假煩打槌回向細大事務列諸條章凡僧堂關係水頭炭頭供頭一一提點便眾為懷若夫興化會裏克賓棒下罰錢出院百世標準也罪知客官貴檀越尊宿諸山門子報及預當門迎次報方丈庫司知客即同引見接禮輕重臨時變通送安下已相引人事游山披覽不得妄談鄙事接迎方來兄弟茶湯管顧如儀施主入山須預引接維那假出叢林事一體行之或自有他緣須白侍者事同一也旦過寮常備燈油柴炭僧堂前撿點行益客人粥飯整齊遇亡僧同侍者把帳暫到死主其喪事雪豆在大陽禪月石霜會下皆典此職垂烈百世周知浴凡遇開浴齋前挂牌寒月五日一浴暑熱每日淋汗粥了發火鋪設浴室挂手巾出面盆拖鞋鋪脚布參頭差行者直浴半晚浴頭覆首座方丈維那鳴皷三下浴聖桶內皆著湯次第巡廊鳴板三下鳴皷開浴一通僧眾二通頭首三通知事行者四皷人力監作彈壓浴次刊揭門首住持二皷前後室內小牌白字一湯二水三滿打小板出浴看有設浴施主課經回向盖妙觸宣明成佛子住前念是凡後念是聖則功不浪施矣古來住持例在三皷入浴用屏風者遮行者也藏室和尚住溫州能仁因幹在二皷入浴浴罷請罪於頭首發知殿嚴淨几桉常滿燈油聖像時當拂塵供養隨宜修設施主香錢油錢無移互用責令行㒒勤奉香燈或遇風起須滅爐火結起幡脚勿近琉璃朔望節假開設殿門士庶往來隨心瞻仰大剎佛殿成道涅槃諷經了煎湯毋得多重抄覔燈油錢令生厭心返招惡果也商侍者燒香之職近侍左右聽教朝昏期法道集大成舉賢能合輿論相看通覆委曲周旋尊宿諸山送迎合禮每事愽問先知不致貽笑上下方丈如子侍父餘時不可預坐方丈行㒒失事時時誡之住持事繁是事關抱維那知客他出回向打槌事同一也亡僧輪把帳住持暫不赴堂立班諷經如常久出則歸眾也諸山相訪在兩班後人事插香展拜官員到來拱聽畣對住持恐有失應畣處當代言之上堂佛事請益因緣隨即錄呈慶喜之侍瞿曇香林之侍雲門佛祖寄重其可忽諸書狀之職英財特立黼黻宗門官員書尺往還山門製疏作榜方丈命下具草稟呈如無書記文翰一體乃贊輔住持也既不預回向打鎚亡僧不應把帳然亦隨方毗尼當究宗乘期出生死毋事筆硯虗度一生如石田之侍破菴不尚翰墨慧命重焉請客之職出類萃毗贊叢林官貴尊宿諸山相訪須當具禮欵延節﨟茶湯特為管待先當具請狀書自己名燒香侍者他故回向打槌把帳一同上位到門或住持未知首先迎接早晚咨參克成道業異日領袖叢林自茲發軔矣衣鉢之職諳歷叢林老成之士廼任厥責諸方通用晚輩敗德悞事非輕進納賢良忠諫過失應緣接物不可違時方丈一應禮節究心提點頭首寮舍缺典一一以時照拂之兩序進退須預咨謀貴在得人庶符輿論如佛照和尚兩主育王皆元庵主侍左右浙翁退知客後韜晦前資十七年元異顧之密庵和尚住華藏松源岳司藏鑰脾疾赴眾缺典庵叱之後赴靈隱不得侍行如侍者掌衣鉢閤左轉右旋之二大老後世其家住持者可不審諸聖僧侍者貴在道心二時下供打下堂槌朝夕交點被鉢位中夜剔燈同維那交収亡僧錢住持遷化係把帳上首不過堂入堂打槌供頭上供參頭打下堂槌本山侍者名字退耕和尚自此職歷至前板然後出世此是前輩立身之模範也湯列項職員副寺之職職小任重眾人命脉所繫米當須細潔粥飯貴得精豐醬黃豆豉合辦及時鹽醋姜油滿足供眾缺乏預謀上首尅落常慎下流無徇私情勿圖己計推情保惜如護眼睛先德分司列任本為眾人今昧原深加刻削麤飯薄粥臭醋淡韲非惟任責者之無知實在住持之有過典座之職無真心供養者不宜徇關節妄請之當與前堂首座謀議從眾擢用萬不失一也當廣種蔬菜力除草穢四時合種雜物勤看老圃須知園丁當以私惠優其寒暑調和羮菜五味須全油醬椒料常住有限須出己囊助辦堂供一人辦心諸天辦供多見所在假名職圖監収園地半占㘽麻苧以為園丁補洗代相承習以成弊厨中不許棄賤諸物執役選用苦行老成若設大齋食次與上首知事商議過多減除皆不可也行者不律誨而至再不受訓者責之罰之同利均俵粥飯上桶焚香望僧堂設拜常把眾人頂在頭上自獲福利不汝欺也直歲之職日生事務無爽其時護惜山林庇風水牧養火佃成褫常住掃洒廊廡疏決溝渠措辦柴薪巡警火盜灰記漏跡待晴整捉凡大修造各有司存勤苦向前以盡厥職古人一日不作一日不食思之莊主之職提督農務不可失時撿察田段牧養客佃頑暴者懲戒之貧病者優補之單丁者以時差役之旱澇灾氛課誦禳保勿縱淫祀恣害物命諸佃重過具申山門暫到經過溫存食宿毋尚刻剝竭力運謀使火佃有追思之心常住有羨餘之益方為善美矣寮元之職隨處毗尼江左叢林盛時大慧挂牌普說班列西序之下者當知所自也每日早粥下堂茶頭鳴寮前大板三下大眾歸寮問訊寮長分手寮主副寮對面左右位副寮出燒香一炷歸位茶頭當中立喝云不審大眾和南了各回寮舍問訊朔望係寮元自燒香令挂點湯牌燒湯出盞鳴寮前大板大眾如常入位寮長分手寮元起燒香中爐上下間問訊了復位坐行湯畢起爐前謝湯每日督備茶湯冬月炭火暑天熟水燒湯泡衣洗衣濯足収拾動用什物經書玩具為眾如己何事不辦事事準繩合度人人禮皃可觀所謂旃檀叢林旃檀圍繞也寮主之職為眾結緣相恭敬維那拜請送歸寮舍撿點經書玩具夏中兄弟借看具名上單中夏収起兄弟入寮係接迎之公界坐禪看經看守經櫃夜間同寮元巡視經桉或失鎻者留記鎻之天明白之遇節臘舉經回向一旬職滿退白堂司寮元它出餘事一同副寮之職其事繁重寮中什物逐一交割分明職務一旬關攝諸事粥前參後不許登閣有急切幹者須白寮主書日書名打板上閣庶免後患時時提點湯瓶夜看火燭賊盜掃地拭桉換水添香勿容外人止宿寄賣物件子細収藏衣竿熨斗洗衣桶眾人所用之物各収元處善用其心獲勝妙功德也望寮之職先輩深有意焉受職到寮預知寮中細大副寮出盞點茶相與収拾放參藥石行醋行鹽結緣邊事也延壽堂主奉養病僧常備姜棗油燭五味以時管遇病者呻吟當生愍念病稍輕安勿縱補益恣噉無厭久佔房榻病是眾生良藥當改過日新孤燈獨照時正好著力街坊之職緣化施主添助常住隨彼施心毫厘無易緣事若多不可重扣初檀令生厭賤世尊乞食不越七家如阿難之歷街切貧女寄破氈奉佛生難遭想則可也水頭之職每朝燒湯眾人洗面手巾乾淨冬月焙烘常備燈燭牙藥更點未出鋪排面盆候洗面畢覆盆元處揭起手巾妨污染也盆留一二隻舊巾一條以待後來者預積柴薪善緣為念炭頭之職暑月做造炭團辦積白炭或化施主或出庫司預當究心備準足用開爐後粥了參前更點未出裝爐齋後隨宜添之無失常度以道為懷可也磨頭之職清眾喉噤麥用淘洗乾濕令均羅厨細密面分頭次舂米潔白篩簸糠碎依時出粜或歸庫司或俵同利務在公明為眾辦事外修持道業如東山妙用縱橫火中蓮也園頭之職勤苦率先灌溉地段㘽布蔬苗存撫園丁朝夕無怠収種下子及節依時火種刀耕以古為念忽然拋下钁頭歸去豈不快哉樹頭之職山門松徑蔭樣竹木護惜山林備修造常切巡視㘽補及時因果歷然功無浪施人少松枯再來良未晚也淨頭之職果自因生每朝掃地裝香及時剔燈點燭換籌洗廁出桶拖鞋手巾乾淨湯水寬容澡豆頻添灰土常滿或時狼藉打併宜勤討柴洗籌俯恤人力觸邊明淨道業圓成雪豆在靈隱牧庵妙喜寶峰會中皆服勤斯務矣坐百丈規繩頌按百丈大智禪師以禪宗肇自少室至曹溪以來多居律寺雖則別院然於說法住持未合軌度故常爾介懷乃曰祖宗之道欲誕布化冀其將來永不泯者豈當與諸部阿笈摩教為隨行耶梵語阿含今云阿笈摩即小乘教也或曰瑜伽論瓔珞經大乘戒律何不依隨耶師曰吾所宗非局大小乘非異大小乘當愽約折中設於制範務其宜也於是創意別立禪居頌曰昔時居律寺別院啟禪門大智禪師後方知祖道尊大哉大智禪師之立法也尊住持以隆道德列班序以顯才能綱紀叢林昭烈今古貴要人人遵守祖道愈光設或悖法亂倫斯文喪矣因立制令區別賢愚見賢思齊庶成保社一堂中及寮內去失衣物等須具衣物色數時節處所聞白主事驗認有無虗實如情重者白堂司集眾搜堂及寮犯者公行妄者辨眾頌云眾中如去失色件要分明物重須搜撿情輕事可評一聖眾內或有盜竊酒色及鬪諍污眾喧亂不律等事皆集眾弃逐出院不從即聞公頌云盜財并鬪諍酒色污僧倫速遣離清眾容留即敗羣一或有假號竊形混于清眾并別致喧撓之事堂司維那撿舉抽下本位挂搭擯令出院貴安清眾也頌云不信天真佛來為假比丘即時抽挂搭去矣莫回頭一或有重犯玷辱同倫并院門即須集眾以拄杖杖之焚燒道具逐從偏門而出者示耻辱也頌云犯重焚衣鉢應須集眾人山藤聊示耻驅擯出偏門一堂內清眾如不充主首掌握山門但隨眾齋粥參請外當各自省己守分積德隆道用光叢席不可已外干管院務擅自更張生事走扇是非有撓清眾無令安靜違者即準院令頌云三條椽下客自了一身休幸有僧知事何須強出頭詳此條制有四種益一不污清眾生恭信心故三業不善不可共住準律合用梵壇法治之當驅出院清眾既安恭信生矣二不毀僧形徇佛制故隨宜懲罸得留法服後必悔之三不擾公門省獄訟故四不洩外護綱宗故四來同居凡聖孰辨且如來應世尚有六群之黨況今像末豈得全無向見有輩但見一僧有過便雷同譏誚殊不知輕眾慢法其損甚大今禪門若無妨害者宜依百丈叢林格式量事區別雖立法防姦未為賢士然寧可有法而無犯不可有犯而無教推百丈大智禪師護法之益其為大矣
