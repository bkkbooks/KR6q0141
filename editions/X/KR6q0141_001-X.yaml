body:
  text: 廬山東林太平興龍禪寺住持比丘弌咸編天聖節陞座諷經啟建屆期僧行不給假堂司整備黃榜上殿經單輪差僧簿維那先五日粥了備柈袱爐燭香小片紙詣書記寮插香觸拜缺員書狀侍者同當還香拜稟云天節拜請製右語製了先呈方丈親送堂司還觸拜維那染䟽用黃紙僉貼處如法嚴整隔宿備柈袱爐燭香合維那具威儀行者帶人力拓柈上方丈僉疏行者覆住持出即炷香稟云來日啟建節拜請和尚僉疏呈疏僉了而退行者就覆方丈來早諷經挂諸處諷經牌燒香侍者覆方丈來早上堂正日僧堂徧食槌浚再槌一下云白大眾粥罷聞鍾聲各具威儀詣大佛殿啟建天壽聖節謹白復槌一下往住持前問訊面北巡堂一帀至外堂下間至上間歸內堂中問訊出正日行香了侍者覆住持粥了上堂客頭挂上堂牌大殿排香燭湯茶鐃鈸手爐堂司報方丈客頭先覆住持覆侍者鳴皷堂司預鳴眾寮前板三下集眾坐堂單寮蒙堂諸寮並外堂坐住持出寢堂坐侍者問訊東班立行者西立轉鼓侍者下法堂上角立頭首下地聖僧前問訊領眾出堂上法堂座前一字立問訊歸立西班大眾鴈列于后行堂鳴板三下參頭領眾列庫堂前或土地堂前俟問訊知事班集法堂西班歸班已亦一字列座前問訊都寺引班歸左朝揖立定眾行者至法堂上間左列迎住持侍者入請住持住持轎到眾前行者列知事後眾去頭袖問訊住持和南登座侍者隨上座香合蓋盛香皷絕捧呈住持祝香了侍者接香以左手插爐中右手拈從香一炷蓋合住持上脚踏問訊斂衣趺坐侍者下座先末班引過座下一字列問訊燒香侍者引班歸位次首座領班座前一字列大眾同問訊歸班次東班出班行者隨問訊歸位有東西堂座下出班問訊叉手出班合掌歸位侍者登座開合左手上香一炷蓋合轉身提坐具問訊住持謂之請法側立拱聽問答回向提綱不許敘謝官貴況語餘事結座白云大眾各具威儀詣大佛寶殿啟建節下座鳴大鐘眾到殿點茶湯侍者下畢鳴行香鈸維那轉身爐前揖住持上香侍者捧香合次東堂西堂出班兩序對出無借香問訊若堂中立僧首座大方西堂先於立班西堂前出班也東序右手上香左轉歸位西序左手上香右轉歸位出班畢大眾同展三拜此拜佛為告天祝壽也住持不収具就跪爐非法維那白佛宣疏至右伏以住持再燒香展拜跪爐知客跪進手爐侍者跪進香合宣疏畢知客跪接爐住持収具或住持受州縣關請上首知事偏位跪爐庫司客頭跪進手爐復跪接爐庫司茶頭跪進香合惟那舉楞嚴回向啟建堂司行者隔日將轉僧簿請住持頭首眾僧僉書上下字名具寫差單輪排經目于上揭挂殿內至日住持同眾上殿看經各務嚴肅鳴大鐘上殿各炷香三拜歸位看經維那當詣殿燒香一炷大展三拜知客躬當點湯茶庫司嚴設香燭點心湯茶堂司行者供送恐有缺典維那時當照拂至晚鳴大鐘下殿每日僧員依戒輪定堂司庫子直殿行者時時守防官員到來拈香鳴鐘集眾諷經方丈庫司迎送聖節內遇八佛殿念誦巡廊鳴板眾集相對鴈立住持至鳴大板即鳴大鐘燒香歸位維那出班念誦式見後誦畢鳴僧堂前鐘三下眾散先不請湯也凡遇聖節啟散暫到客司給由隨身照證住持領眾看經知事營供俵嚫祝一人壽務在處誠當報水土之恩也滿散節目並同堂司製疏具列經文例留交割準備刷具凡住持公出歸日不問近遠鳴鍾集眾門迎詣方丈人事眾散住持更不相巡寮報禮也陞座回向前同榜意今辰啟建住持臣僧升于此座舉唱宗乘所集洪因端為祝延聖壽萬安者白佛偈玉毫騰輝金色炳耀具大人相號正徧知瞻之仰之福滿沙界又大圓滿覺應跡西乾心包大虗量周沙界回向上來諷誦洪因祝延聖壽萬安金剛無量壽佛仁王菩薩云云佛殿念誦皇風永扇帝道遐昌佛日增輝法輪常轉為如上緣念清淨法身毗盧遮那佛路由暫到一僧某甲上座今月幾日恭遇天節已於本寺啟散訖憑此為照者年月日某寺知客某押給右語啟伏以紅日升時四海賴照臨之慶白雲深處常年伸祝頌之誠以不可思議之功𤏩倍無有筭數之壽量皇帝陛下恭願淵獻珠山獻玉令夷夏之歸仁車同軌書同文盡山川之一統但臣僧某下情無任瞻天望聖激切屏營之至謹疏散天開閶闔慶流虹遶電於斯辰人効華對悉望日瞻雲於此際爰畢三旬之華藏聿嚴萬歲之山呼恭願曆數在躬文明至治九五福曰富曰壽無彊為休八千歲為春為秋自今而始地旦望祝聖陞座預晚燒香侍者詣方丈咨稟上堂次早問訊時提起令客頭行者挂牌報寮早粥不鳴下堂鐘方丈客頭敷陳法座茶頭秉燭裝香堂司行者覆首座眾寮前鳴板三下報眾坐堂首座與眾頭首立僧堂前候鼓初鳴入堂首座居後入轉鼓首座領眾詣法堂兩班問訊法座各東西列班住持登座祝香了出班聖節同禮古之學者有疑未決出眾請問宗師答話貴在解粘去縛今之索話已失古意先大慧深非之住持舉揚端祝一人之壽有官客略以敘陳激發學者細大因緣則在五參升堂山門大小事務方丈會茶講議晚參訓習童行各有其時法堂演唱宗乘不可敘談世諦厭眾聽也玄藏殿祝聖諷經夫旦望藏殿祝聖諷經者期帝道遐昌法輪常轉也粥罷行者報堂鳴鐘集眾鳴皷轉藏行者鳴鈸維那舉云稱念摩訶般若波羅密多住持領眾繞藏行道三帀以表法輪三轉立定維那舉大悲呪回向大圓照中有華藏海功超造化道絕名言三光電卷而實相閑六合雷奔而湛然寂不思議法難盡讚揚某州某寺住持臣僧月旦令辰謹集合山僧眾恭趁藏殿繞旋行道稱念摩訶佛母聖號諷誦秘章所集洪因端為祝延今上皇帝聖壽萬安金剛無量壽佛仁王菩薩云云又三轉法輪於大千其輪本然常清淨天人得道斯為證三寶從茲現世間黃朝廷祈禱凡遇焚修祈禱須䖍誠齋沐如法鋪陳華果新鮮香燭殊勝殿宇時時洒掃僧眾整肅威儀官員拈香加禮迎送住持知事無涉他緣耆舊寮舍常切嚴淨期必致效功有攸歸山門祈禱庫司先覆住持意旨預呈維那堂司行者報寮挂牌二時集眾諷經啟散嚴設供養遇夏祈禱楞嚴會不得就便回向指日告功每日早粥下堂到殿諷經輪日回向隨方毗尼有處五參陞堂則不諷經非法也若旦望下堂須必祝聖諷楞嚴呪須結呪心漸次方緩緩舉呪克期功効各冀專誠宇如來降誕將屆誕期堂司行者率眾財具數送櫃頭營供養此古法也在住持講行維那命書記製右語僉疏並與聖節同庫司預令行者嚴設毗藍園內安太子銅像煎香湯安二小杓盆內大佛前敷陳供養至日粥罷住持陞座祝香提綱回向結座下座云大眾各具威儀詣大佛殿浴佛諷經大眾同到殿住持上香三拜不収具進前獻湯進食侍者下竟復位三拜上香下嚫點茶三拜収具鳴鈸維那揖香住持上香侍者捧合兩班無借香問訊出班了大眾同禮三拜詳為聖節禮同如或住持它緣首座偏位跪爐聖僧侍者堂司庫子跪進手爐香合方丈侍者亦得為法重也古宿公論唯佛祖忌當首座代住持為傳法故聖節知事代為山門也大慧笑翁皆行之維那白佛宣疏了舉浴佛偈行道浴佛須備銅錢浴佛將畢舉楞嚴會上起呪諷了回向云上來諷經功德回向真如實際莊嚴無上佛果菩提四恩等報三有齊資十方三世云云陞座回向某州某寺四月初八日恭遇本師釋迦如來大和尚降誕之辰比丘眾率長財入常住營備香羞以伸供養遺教遠孫比丘某甲升于此座舉唱宗乘所集殊勳上酬慈蔭者白佛偈一月在天影涵眾水一佛出世各坐一花白毫舒而三界明甘露洒而四生潤浴佛偈我今灌沐諸如來淨智莊嚴功德聚五濁眾生令離垢同證如來淨法身右語兜率天宮不起于座而常說是法毗藍園內乘大願輪而示現受生顧上下與四維稱獨尊於三界芳流像教屬此日之誕彌瑞湧龍淵効當年之灌沐本師釋迦如來大和尚伏願運甚深之智海回既倒之狂瀾盛世光明上延聖主無疆壽微塵含識同證如來淨法身謹疏宙涅槃成道凡疏語回向即涅槃成道之辰預日製疏率眾財回供養出班展拜佛誕禮同唯涅槃陞座先當早粥下堂藏殿拈香諷經祝聖佛誕涅槃成道常住設供無嚫唯佛誕涅槃成道香住持懷中取出自插爐中白佛偈淨法界身本無出沒大悲願力示有去來正覺山前覩明星而悟道大千界內駕慧日以流輝回向上來諷經功德回向真如實際莊嚴無上佛果菩提四恩普報三有齊資法界有情同圓種智十方三世一切諸佛云云右語千百億身徧塵區而不滅七十九載順世相以無常想滿月之慈容對中春而殞涕慨此拈花之微旨漸成蔓草以難圖供効純陁誠伸追遠本師釋迦如來大和尚伏願覺天空闊蕩蕩乎無能名焉慧日流暉皜皜乎不可尚矣盡眾生法界契涅槃妙心成道雪覆千山大地春回寒谷星明午夜覺天雲散長空示六年苦行之因證歷劫進修之果某等叨承末運忝嗣宗猷深懷麻麥之飡茲焉有愧虔奉蘋蘩之供理亦難忘本師釋迦如來大和尚伏願餘光照臨開發蒙昧大千國土永延聖主福壽康寧一切眾生咸證如來智慧德相洪達磨祖師忌將屆諱辰堂司預命製疏僉疏佛誕禮同既尊佛祖禮宜一體今尚簡無疏非尊祖重道之意住持專誠山門執事備辨維那侍者提點法堂敷陳玩具書𦘕參頭差行者排辦守直法座挂真嚴設祭筵爐瓶香几一一如儀上間即設禪椅拂子衣架挂法衣下間設椅子經桉爐瓶香燭經卷而已設床榻者非堂司行者覆方丈諸寮當晚諷經并覆來日半齋各具威儀散忌諷經參前鳴僧堂前鐘集眾鳴皷獻特為湯住持上香三拜不収具進前上湯侍者下竟復位三拜進前勸湯問訊三拜収坐具行者鳴手磬維那出班念誦式見後誦畢鳴僧堂前鐘三下眾散昏鐘鳴集眾諷經住持上香維那舉楞嚴呪回向次參頭領眾排前喝參禮拜諷經作寮排列聲喏參拜諷經次日早粥罷住持如常上香上湯維那舉大悲呪回向半齋鳴僧堂前鐘集眾法堂上下間面祖排立住持上香三拜不収具點湯進食侍者下竟復位三拜進前燒香下嚫三拜収具鳴皷講特為茶禮燒香揖茶三拜鳴皷三下住持舉拈香佛事畢行者鳴行香鈸維那轉身爐前揖住持上香侍者捧合次東堂西堂兩班出班畢無借香大眾同展三拜維那白真宣疏跪爐疏畢舉楞嚴回向山門設供無嚫有品食三拜者恐禮過成諂念誦式切以悲願深重道大難名忝借潤於餘波致有光於後裔仰憑大眾念清淨法身毗盧遮那佛十號了上來念誦功德奉為初祖菩提達磨大師上酬慈蔭十方三世一切云云初夜回向淨法界身本無出沒大悲願力示有去來仰冀真慈俯垂昭鑒今月初五日伏值菩提達磨大師示寂之辰比丘眾率長財入常住營備香羞預伸供養諷誦大佛頂萬行首楞嚴神呪所集殊勳上酬慈蔭伏願群機有賴報揚少室之家風妙智無窮成就大乘之根器十方三世一切諸佛云云散忌回向上來諷經功德奉為初祖菩提達磨大師莊嚴無上佛果菩提十方三世云云右語西竺國無邪見師大破六宗之惑東震旦有大乘器肇開五葉之春爰逢瘞履之辰敢効蘋蘩之供菩提達磨大師伏願彌堅本誓不墜單傳俾四七二三之道愈光歷百億千萬之年永茂荒百丈祖師忌昔白雲端禪師立祖堂綱紀序云吾道盛於此土菩提達磨之綱焉剏立禪林之制百丈大智之紀焉此實天下之共知而柰何天下祖堂中各以開山傳次者為其祖殊不思乃宗乃祖所傳所持之㝡者乎嗚呼教來五百年後達磨始來嚮之諸家之賢者豈不知性即乎聖何為竟自以性以聖之泥乎乃須少林之後猶彈指頃不假文字語默有無釋然亡其所待而自得還其本又古之岩居穴處者但以法為勝為味殊不慮今日其間者驕獨大智禪師慮之而廓以禪林之度由是資之而少林之風至今靄然於天下吾欲天下祖堂中以達磨大智正其位以開山傳次者倍之貴來者尊其始歸其大豈不然乎大哉白雲禪師發揚祖宗潛德幽光若揭日月俾天下學者知所宗仰今諸方叢林遇大智忌而不能設為主法者盍思白雲之意正月十七日正忌維那預製疏僉疏法堂鋪設預夜諷經上食拈香佛事大眾拜跪爐諷經散忌與達磨忌禮一同右語大智洞明十日照臨百世真機普赴六趣攝化群生叢林聿新斯文未喪百丈大智禪師伏願巍巍乎疊矩重規瞻在前忽在後轟轟乎朝鐘暮皷老者安少者懷闡爾宗猷繩其祖武謹疏日開山祖忌當遵舊典不忘厥祖可力行之若檀越建寺就請開山例當修忌或立事巧於山門者勿拘也須當於法堂中間鋪設集眾諷經出班展拜與達磨忌同禮回向寶明空海湛死生漩澓之波大寂定門融今古去來之相仰冀真慈俯垂昭鑒今月某日伏值開山某人和尚示寂之辰常住營備齋羞以伸供養比丘眾諷誦大佛頂萬行首楞嚴神呪稱揚聖號所集殊勳奉為真慈伏願曇花再現重開覺苑之春慧日長明永燭昏衢之夜十方三世一切諸佛云云月諸祖忌道行崇重功宰山門隔日法堂鋪陳不可越例若列祖如常粥罷諷經當請牌座法座敷設供養依法出班住持兩班展拜侍者班尾拜借香問訊或大眾拜有見只就祖堂下食一位諷經甚非禮也回向仰冀真慈俯垂昭鑒今月巳日山門伏值前住當山第幾代某人和尚示寂之辰營備香羞以伸供養諷誦大悲神呪所集殊勳奉為真慈增崇品位十方三世一切諸佛云云盈嗣法師忌先德唯以激唱宗乘發明自己誨示方來知有授受以報德也巴陵三轉語作忌不墮流俗後世道不及古務在廣設祭筵修營厚供可無愧乎近代大川做浙翁和尚忌橫川設天目和尚忌方丈設位置食一分燒香一炷大展九拜不許諷經二大老深有意焉然尊師重道禮不可虧忌辰當須設供衣閤中預計錢物歸常住置祭設供法堂鋪陳法座挂真達磨忌同講特為湯請名德西堂光伴列坐之右無則已之住持行禮鳴皷三下退座堂司行者覆參前諷經挂牌報諸寮并報來日半齋各具威儀散忌諷經昏鐘鳴集眾諷經侍者令方丈客頭預請兩班耆舊伴真湯果於法堂上間設位行者計位鋪排如法眷尊長同門兄弟皆當請之小師師孫不可同席無量壽禪師設忌第三座小師伴真湯果非禮也僧眾諷經散侍者揖請兩班耆舊住持引入座坐定住持離位真前上香上湯復位侍者燒香下湯行湯果次早粥罷上香上湯住持展拜僧眾諷大悲呪回向鄉人法眷隨即舉呪半齋鳴僧堂前鐘集眾住持展具三拜上香下食三拜下嚫鳴皷行特為禮燒香下茶三拜鳴鼓三下退座収具出班燒香侍者捧合住持舉佛事兩班出班不借香大眾同禮三拜盖在座下皆曰參學諷經散忌凡諷經時住持只立真左有法眷同列齋時入堂住持燒香一炷大展三拜入位侍者行嚫多見法堂諷經俵嚫甚非禮度送法衣專使首到客司人事知客同專使上侍司煩通報方丈或即相接或在來早侍者令客頭報請兩班專使插香先通客禮起爐前謝茶畢再插香兩展三拜免則止之柈袱托呈法衣信物入座光伴獻茶罷轉特為位獻湯兩班同送安下侍者引巡寮別日致祭上堂拈衣有佛事禮與下遺書同
