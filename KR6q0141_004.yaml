body:
  text: 水專使請住持凡住持補處公拈已定文命下寺庫司會兩班耆舊茶卜日通先書命製山門疏茶湯榜缺書記擇才德人用絹素製榜當修廣如法庫司送紙諸寮作書差能事行者老郎通書次請人充專使或上首知事耆舊後堂書記藏主和會已定若耆舊頭首充專使知事一人同去掌財議事具寫本寺該管田産什物須知迎接從儀一切畢備管待專使一行人至起程日詣諸寮人事帶行僕從聲喏大衆門送山門講茶湯上首知事去下首知事行禮頭首去上首知事行禮揖坐了燒香揖香了歸位點茶再起燒香揖香點湯收盞了便上轎行山門下釘挂面裏設位請兩班耆舊光伴專使到彼寺先見知客同到庫司接送安下備門狀見頭首單寮無門狀詣侍司詳稟來歷侍者令客頭寢堂鋪設卓袱安疏帖侍者入方丈呈門狀住持出專使問訊請趺坐住持廟立專使插香大片展具三拜進前云某𫎇山門使令攀屈尊嚴得奉尊顏下情不勝感激之至又三拜詞云即日孟夏謹時恭惟新命堂頭大和尚尊候起居多福復三拜收具住持各畣一拜詞云叨膺請命有玷宗風且厪遠來不勝多感專使呈疏帖住持領已侍者揖坐喫茶了送客位堂司行者鳴鐘首座領衆詣方丈申賀庫司送香首座知事各插香一片初展詞云法門多幸伏喜榮遷喜勳叢林下情不勝感激之至二展詞云即日孟夏謹時恭惟某處堂上大和尚尊候起居多福觸禮三拜住持各畣一拜詞云自揆疏謬誤膺此選禮意過厪不勝多感衆散知客領專使巡寮畢次第呈納本寺須知從儀什物如住持未允所請再三勸請允命行禮同前當晚特為湯罷藥石夜湯果皆請兩班耆舊光伴庫司排辨玉西堂頭首住持專使到寺先見知客同到侍司引見方丈插香展拜相看禮同喫茶送客位次詣諸寮人事了稟侍者同詣方丈咨稟某寺今請某人住持稟訖侍者同詣受請人寮中相見插香行禮同前如不允即詣方丈咨扣同伸勸請受請了方丈請新命及兩班耆舊茶新命送客位次第受賀巡寮人事當晚方丈請新命專使特為湯藥石湯果兩班光伴出受請衆請升座受請已次日請升座禮與旦望同大方公定遷住古法皆然升座委曲上下提撕學者致謝專使次第點對簿書交割物件煎點卜日起程崑西堂頭首受請升座專使議定來日煎點詣新命前插香拜請方丈引座詞云拜請和尚來日為新命和尚引座至日法座右邊排列疏帖座前左設住持位住持升座日望同致謝新命勸請舉揚令法久住下座專使同侍者知客同問訊請新命即出住持前問訊舉話有無不拘掩室受請松源引座松源受請笑庵引座皆不舉話簡堂受請石橋引座淳庵受請息庵引座皆舉話有無在人若頭首是入室弟子至住持前問訊付法衣有法語新人披衣亦有語抽衣了却披法衣住持趺坐大展三拜詞云一生取辦仰愧先賢來請既勤難逃上命下情無任惶懼之至又三拜詞云即日謹時恭惟堂上本師大和尚尊候起居多福又三拜收坐具進前問訊住持云囊錐已露花雨難難幸是當人伏惟歡慶次拈疏帖各有語若非法嗣或西堂即出座前與住持問訊徑歸座右拈衣拈疏帖各有語專使先稟維那請宣疏帖人宣畢升座垂語問畣提綱敘謝結座下座到住持前兩展三禮免則云叨膺請命有玷宗風仰荷玉成下情不勝感激之至住持畣云喜慶人天之請榮膺佛祖之光下情不勝喜躍之至次第知客侍者引巡寮致謝嗣法下座當兩展三拜云言詞鄙俚有玷尊聞下情不勝感激之至又三拜寒溫了巡寮謝禮同前岡煎點住持當代專使先當與住持議定齋嚫輕重合禮兩班耆舊鄉人法眷辦事貼嚫齋料費用專使親送納庫司置齋至日專使詣方丈插香拜請初展詞云今辰午刻就雲堂特為伏望慈悲降重下情不勝感激之至二展寒溫觸禮三拜住持畣拜兩班單寮方丈客頭同專使行者一一詣寮稟請挂牌報請四寮僧堂鋪設主席知客板頭排專使位至齋時專使僧堂前伺住持入堂問訊接送歸位揖坐歸中問訊揖衆坐中爐上下間外堂燒香了往住持前問訊上下間堂外問訊了中央問訊食遍燒香一炷下嚫了出堂外歸位齋了折水出鳴鼓專使入堂燒香中爐上下間堂外已往住持前問訊上下間外堂了行茶遍如前問訊了收住持盞專使行禮初展云此日水飯伏𫎇和尚降重下情不勝感激之至二展寒溫觸禮三拜送住持出再歸堂燒香一炷大展三拜巡堂一匝并堂外歸中問訊收盞鳴鼓三下退座專使詣庫司謝辦齋次請住持至晚藥石夜湯果皆當請兩班耆舊光伴劒煎點西堂頭首新命專使詣新命前議定方丈嚫施引座謝禮堂嚫貼嚫宣疏帖人陪嚫至日粥罷專使詣方丈稟請云今辰午刻就雲堂備水飯特為新命和尚伏望慈悲俯埀降重答云謹遵來命復詣新命前稟請同前禮方丈客頭同專使行者請諸寮齋時覆新命赴堂堂前俟住持同入堂問訊隨入先揖住持歸位次揖新命歸住持分手位燒香行禮並同前下食行嚫茶畢先收新命盞專使至前行禮初展云此日水飯特𫎇和尚慈悲降重下情不勝感激之至二展寒溫觸禮三拜畣拜送新命出後門專使入住持前行禮初展云此日伏𫎇和尚降重下情不勝感激之至二展觸禮三拜畣拜送住持出前門歸堂炷香展拜巡堂一匝并外堂中問訊收盞鳴鼓三下退座晚湯果藥石光伴同前號山門管待新命當代專使衆知事會議管待嚫禮食品如儀上首知事隔日詣新命前插香拜請次詣客位稟請專使令庫司客頭請兩班耄舊光伴詞語行禮並特為同釘挂寢堂鋪設住持廟位專使住持上首兩班住持左右耆舊對面侍者接知事下位遠接僕從飯當支犒勞巨西堂頭首受命管待亦就寢堂敷設住持主位新命對面位專使新命分手位兩班耆舊光伴左右位詞語行禮並同前闕辭衆上堂茶湯當代住持起離日上堂致謝兩班耆舊大衆下座鳴鼓三下面法座立普與大衆觸禮三拜鳴樓鐘等法器送出僧衆門送兩班由近及遠行僕外排立候送山門首預當釘挂設廟位面裏坐西堂大耆舊分手光伴首座居主東西班兩邊朝坐首座行禮揖坐揖香歸位點茶收盞再起燒香揖香點湯湯罷便上轎兩班耆舊備轎遠送住持當力免之專使一行人先詣諸寮辭別鳴樓鐘俟住持轎隔遠方可止之珠見職首坐辭衆須令專使詣方丈稟借法座上堂辭衆座不敷設下座先辭住持觸禮三拜次面座立普同觸禮三拜辭大衆山門首設位講特為茶湯兩班耆舊光伴上手知事行禮鳴樓鐘送出門若西堂次頭首辭衆臨行先同專使上方丈插香觸禮三拜稟辭次方巡寮辭別山門首講茶湯兩班光伴行禮鳴大鐘送並同前禮稱入院古法挑包頂笠而至如遇迎接下笠問訊或值官貴放包祗揖到山門首下包笠炷香有法語至僧堂前歇包後架濯足回僧堂前取衣披搭入堂有參隨人同進聖僧前大展三拜巡堂一匝參隨先出維那送歸鉢位觸禮三拜挂搭已到佛殿有語禮拜次土地堂祖堂有語知事請入方丈據室次開堂祝壽近自大川和尚赴淨慈笑翁和尚入育王後篾聞也夜入院新法新命到來當看安泊處近遠近則衆往祗迎遠則兩班耆舊而已專使預當計稟批免勞衆兩班耆舊炷香人事罷光伴湯果至日入院庫司當一一排辦堂司行者隔宿挂牌至時鳴大鐘等法器大衆門迎行僕列外新命到門炷香舉語至佛殿燒香法語大展三拜斂鐘歸僧堂挂搭衆入堂已新命入堂炷香大展三拜參隨人同展三拜維那引巡堂一匝參隨先出送歸鉢位挂搭觸禮三拜少林和尚住淨慈靈隱時並要兩班送歸鉢位次土地堂祖堂炷香皆有法語入方丈據室侍者燒香一炷問訊了垂語知事先具狀備卓袱問訊行者呈寺記印新命看封付知事開封視篆訖就狀先僉押書日子打印過付衣鉢侍者收知事全班列前上首知事插香初展云茲𫎇和尚光據法筵下情不勝感激之至答云叨據名藍下情愧悚二展寒溫觸禮三拜諸山各插香草賀却當免香首座領衆插香展賀耆舊各插香鄉人道舊法眷隨賀于后客頭揖請諸山兩班耆舊就座獻湯次請官客諸山升座前點心若前代別遷未赴或退作東堂據室之前講交代禮受賀了鳴僧堂前鐘新命躬送前代歸寮對觸一拜炷香人事次首座領大衆人事行僕衆皆當參拜呈寺記狀式當寺庫司比丘某寺印一顆右謹申納新命堂頭大和尚伏候慈旨年月日當寺庫司比丘某狀光請齋據室人事了知事預具狀備柈袱爐燭詣方丈插香請齋初展云午刻就雲堂備水飯秪迎伏望尊慈特埀降重下情不勝感激之至二展寒溫觸禮三拜住持畣一拜呈狀方丈客頭收庫司客頭鋪設僧堂住持位管待禮同狀式當寺庫司比丘某右某啓取今辰午刻就雲堂聊備水飯祗迎伏望尊慈特埀降重謹狀年月日當寺庫司比丘某等狀狀請新命堂頭和尚大禪師尊座前具位某等謹封果開堂祝聖古者輦下列剎朝廷差官馳命敦請就某寺開堂官給錢料設齋近來開堂座下設位至時侍者分付客頭鋪設法座報寮挂牌覆升堂了巡寮具寫官員諸山名位預呈方丈專使分付座左鋪卓袱排列疏帖和會宣讀人先送看過公文例係維那宣山門疏首座宣餘疏次頭首宣庫司備香送上方丈預請諸山白槌座前對面排官員位次裝香秉燭覆侍者次覆方丈鳴鼓集衆禮與旦望同侍者同專使入請住持行者鳴鈸花幡挑燈從引至法堂位前如受請時未拈衣當舉話披法衣次專使插香行禮初展云此日伏𫎇和尚光據法筵下情不勝感激之至二展寒溫觸禮三拜住持各答一拜先呈公文有語付維那宣白行者扛疏次山門諸山江湖疏一一呈拈舉話宣讀若見任官疏請開堂官員須先親自呈疏次山門疏住持指座有語升座拈香祝聖次拈府縣官僚香若建寺捨田大檀越當拈香侍者逐一度香惟法嗣香懷中拈出拈了自插爐中據坐侍者燒香下座兩班出班問訊畢侍者登座燒香問訊禮與旦望同座右白槌云法筵龍象衆當觀第一義垂語問畣提綱敘謝官員諸山云開堂祝一人壽不敢讚德專使兩班耆舊大衆略提過謝在小參時也結座白槌云諦觀法王法法王法如是下座略送一兩步知事接送客位管伴客頭行者即進爐燭一字排前先專使人事堂司行者喝云諸山人事次西堂人事當免香禮知事一班兩展三禮次首座耆舊蒙堂前資諸寮各插香同大衆兩展三禮次莊庫庵塔法眷鄉人暫到先同衆行禮已若免禮觸三拜通用詞云伏𫎇和尚光據法筵下情不勝感激之至答云叨據名藍不勝愧竦進罣罳椅子據坐侍者插香大展九拜小師插香大展九拜皆無詞語次諸山行者方丈行者親隨人六局次參頭領衆插香禮三拜轎番直廳莊甲作頭諸寮供過老郎寮主領頭參拜住持即往客位致謝官員諸山以盡禮也珍巡寮諸寮舍敷陳香几位次爐燭香各具威儀次第俟巡寮方丈客頭先行通覆住持至寮主先於門前下手立迎入請趺坐插香住持畣香略敘寒溫致謝送出聽呌收香蒙堂四寮衆皆列門外下手同接入同送出謂衆寮人衆只寮元接送非法次第巡寮畢歸方丈照拂官客諸山李特為茶湯住持若要省事預批免茶湯榜庫司寫請狀備柈袱爐燭詣方丈插香行兩展三禮免則觸拜請云齋退就雲堂點茶特為伏望慈悲降重請已呈狀令客頭請兩班耆舊光伴挂牌報寮僧堂鋪設住持位齋時聞長板鳴炷香展拜巡堂請茶齋退鳴鼓集衆上首知事揖住持入堂歸位揖坐燒香一炷住持前揖香中問訊立行茶畢瓶出往住持前揖茶退身龕後右出炷香展三拜出堂引全班至住持前行禮謝茶詞語送出復歸堂炷香上下間問訊收盞退座並與結夏特為茶禮同有榜當先安下處呈新命入院日挂僧堂前上下間茶湯只炷香稟請但請湯罷覆就座藥石狀式當寺庫司比丘某右某啓取今辰齋退就雲堂點茶用伸陳賀之儀伏望尊慈特埀降重謹狀湯狀只改湯字並同年月日當寺庫司比丘某甲狀可漏端狀拜請新命堂頭大和尚尊座前當寺庫司比丘某謹封奈小參湯罷侍者覆住持令客頭報寮挂牌具寫專使兩班耆舊四寮莊庫庵塔暫到行堂入院侍者禪客參隨或有宿山外客逐一條列預呈新命復收至敘謝行者秉燭侍者捧呈詳申謝悃官員諸山留宿當設位下座方丈客頭喝請云方丈和尚請諸山和尚兩班西堂大耆舊𫎇堂侍者禪客即今就寢堂獻湯知事送官客歸客位衆散而後湯果請專使參隨人光伴菜檀越升座建寺捨田大檀越知事須隔宿覆方丈次早侍者令客頭挂牌報寮庫司差人嚴設祠堂備供養粥罷特為上堂下座集衆詣祠堂知事先到燒香點茶湯上供養住持至炷香歸位維那舉經回向然隨方毗尼也重管待專使知事預稟住持專使厚嚫宣疏帖人嚫衣鉢閣備貼嚫重輕合節至日寢堂釘挂鋪設位次請兩班耆舊光伴中設專使特為位請客侍者躬請專使餘人則方丈客頭稟請禮與前特為同芥留請兩班兩班俟管待專使畢午後俱詣方丈咨稟告退首座報集西序都寺報集東序方丈垂情委曲送出侍者令客頭備柈袱爐燭湯具住持同侍者一一詣寮點湯勉留客頭先報寮出門外右邊迎住持入門居主位分坐侍者燒香行湯收盞住持詳盡勸勉已送出門諸寮庫司同若職滿俟久亦當詣諸寮點湯勉留盡主禮也候住持參訪罷再上稟辭次第進退薑參訪出入入院之先未參府縣官屬當即具門狀參見次謁檀越寄居官貴諸山亦用門狀合訪及處在知事逐一稟覆住持出門令行者傳語首座維那諸頭首知事當詣方丈候送庫司當探計住持歸期令堂司挂牌報衆俟入山鳴堂前鐘集衆門迎住持出轎問訊云勿勞大衆即往佛殿土地堂燒香首座領衆至方丈接已衆退客頭揖請兩班耆舊獻湯略敘話而退方丈行者插香禮拜次參頭領衆禮拜住持須巡寮報禮城郭近便朝暮出入無時不必講行凡公出遠歸首座領衆迎接住持傳語免到方丈或密歸鉢位巡堂一匝而上方丈或密回方丈兩班耆舊皆當詣方丈問起居無準和尚住徑山日化緣多出入每闞齋粥時徑歸鉢位伴衆食挂鉢了方丈客頭喝云方丈和尚巡堂人事衆下地住持燒香一炷巡堂一匝出堂喝云堂頭和尚傳語不煩訪及兩班耆舊亦當詣方丈省問當炷香獻茶欵曲敘話而散海交割什物方丈請兩班大耆舊茶詳説家務次至庫司恭眼同撿視御書寶器砧基物件先呈方丈次呈頭首耆舊逐一點對交割計算財穀簿書分明見管若干具呈方丈參照須知諸莊佃戶換契住持備榜諸莊曉示諸方多於住持交換之際執事作弊苛取錢物後患非輕可不審諸庫司此日備點心
