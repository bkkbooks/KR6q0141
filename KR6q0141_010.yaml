body:
  text: 女日用清規無量壽禪師嘉定間分座信之龜峰時述也茲筆以備日用序云脫塵離族圓頂方袍大率經歷叢林切要洞明規矩舉措未諳法度動止不合律儀縱有善友良朋詎肯深錐痛劄循習成弊改革故難致令叢席荒涼轉使人心懈怠屢見尋常目前過患遂習百丈成現楷模原始要終從朝至暮要免頭頭敗闕直須一一遵行然後敢言究己明心了生達死世間法即是出世間法行腳人可貽未行腳人庶幾不負出家身心抑亦同報佛祖恩德謹列于后入衆之法睡不在人前起不落人後五更鐘未鳴輕輕擡身先起將枕子安腳下未要拗摺恐響驚鄰單抖搜精神將被褁身端坐不得扇風令人動念覺睡來將被堆腳下取手巾轉身下地巾搭左手想念偈云朝從寅旦直至暮一切衆生自回互若於足下誤傷形願汝即時生淨土唵逸帝律儀娑婆訶輕手揭簾出後架不得拖鞋咳嗽作聲古云揭簾須垂後手出堂切忌拖鞋輕手取盆洗面湯不宜多右手蘸齒藥揩左左手蘸揩右不可再蘸恐牙宣口氣過人漱口須低頭吐水以手引下直腰吐水恐濺鄰桶不得洗頭有四件自他不利一污桶二膩巾三枯髮四損眼不得鼻內作聲不得噴水撲面不得高聲嘔吐不得以涕唾污面桶古云五更洗面本為修行嘔吐拖盆喧堂聒衆拭面不得爭址手巾不得以巾拭頭用畢須攤挂或焙火上在上堂左足先入在下堂右足先入上被位眠單收一半坐定若換直裰須將新者覆上抽去舊裰不得露白不得扇風燒香禮拜宜於鐘未鳴時披袈裟先合掌頂戴念偈云善哉解脫服無相福田衣我今頂戴受世世常得披唵悉陀耶娑婆阿摺袈裟之法先摺搭手後解環不得以口銜袈裟不得以頦勾袈裟摺了置之問訊而去殿堂禮拜不得占中央尊住持也不得出聲念佛不得行禮拜人頭邊過五更住持首座坐堂前門不許出入開小靜方摺被拗枕摺摺被之法先尋兩角以手理直不得抖擻作聲不得扇風不得橫占鄰單位先摺面前一半次摺近身一半蓋巾被上或殿堂禮拜或歸衆寮次第過堂板鳴歸鉢位須上肩順轉左肩上肩上床不得背人若入前門從南頰入不得中央北頰入尊住持也歸鉢位低躬問訊上中下座若已先坐上中下座來須合掌古云不敬上中下座婆羅門聚會無殊登床偈云登此無礙解脫床人等智慧清淨光聞長板鳴下鉢擡身起令正立定然後轉身亦順上肩合掌念偈云執持應器當願衆生成就法器受人天供取鉢左手托鉢右手解環左手提鉢轉身令正蹲身放鉢免將腰背撞人堂前鐘鳴下床問訊迎住持也須進前一步莫令袈裟搭床弦不得探坐三淨地不得以手左右搖曳仍低細上床不得頓身坐取鉢安面前聞槌聲合掌想念偈云佛生迦毗羅成道摩竭陀説法波羅奈入滅俱絺羅展鉢之法先合掌想念偈云如來應量器我今得敷展願共諸衆生等三輪空寂然後解袱展淨巾覆膝上摺轉袱三角莫令垂下次展鉢單仰手取鉢安單上以兩手頭指拼定取饙子從小次第展開不得敲磕作聲護第四第五為觸指摺鉢拭橫身前上橫放匙筯袋放鉢拭下出則先匙入則先筯把處為淨頭向上肩鉢刷安第三饙縫中出半寸許盛生飯匙筯頭不可出生飯不過七粒大小為慳食維那念佛手指不得參差須高低當𦚾得中不得以手托口邊古云參差合掌不當𦚾十指交加插鼻中拖履揭簾無細行嘔聲泄氣逞英雄兩手捧鉢受食想念偈云若受食時當願衆生禪悅為食法喜充滿若見鉢滿念偈云若見鉢滿當願衆生具足飽滿一切善根要食多小起手止之聞遍食槌看上下肩以面相朝揖食不得正面以手搖兩邊揖罷想念偈云此食色香味上供十方佛中奉諸賢聖下及六道品等施無差別隨感皆飽滿今施受等得無量波羅密作五觀一計工多少量彼來處二忖己德行全缺應供三防心離過貪等為宗四正事良藥為療形枯五為成道業故應受此食出生偈云汝等鬼神衆我今施汝供此食遍十方一切鬼神共喫食之法不得將口就食不得將食就口取鉢放鉢拈匙放筯不得有聲不得咳嗽不得畜鼻涕若發噴嚏當以衣袖掩之不得抓頭恐風屑落鄰單鉢中不得挑牙不得嚼飯啜羮作聲不得挑鉢中央食不得大摶飯食不得將口待飯食不得遺落飯食不得手把散飯食如有菜滓安屏處使扇不得扇鄰肩如自己怕風白維那堂外坐不得手肘枕膝上隨量受食不得請折頭鉢不得盛濕食不得將羮汁頭鉢內淘飯食不得挑菜頭鉢內和飯食食時須看上下肩不得太緩未再請不得先刷鉢不得吮鉢刷作聲食未至不得生嗔逼討古云呆呆四顧起悲嗔念念吞津咳嗽頻摝粥啜羮包滿口開單展鉢響諸鄰洗鉢之法頭鉢盛水不許在內洗匙筯次第洗饙子不得灌漱不得吐水鉢中不得先盛熟水洗鉢未折水不得先收蓋膝巾不得將膝巾拭汗不得瀝水地上折水偈云我此洗鉢水如天甘露味施汝諸鬼神悉令得飽滿唵摩休羅細娑訶收鉢以指按定次第而入袱了合掌念食訖偈云飯食已訖色力充威振十方三世雄回因轉果不在念一切衆生獲神通鳴槌一下住持下地次第挂鉢出堂上殿諷經了歸衆寮鳴大板三下問訊不歸輕侮大衆入門分四版頭依位立定寮主出燒香一炷復位茶頭中立喝云不審大衆和南若赴茶不得垂衣坐不得聚頭語笑不得隻手揖人不得包藏茶末古云登床宴坐不可埀衣隻手楫人是何標格私藏茶末取笑傍觀時中鄰桉道人切忌交頭接耳若看經不得長展經謂二面也不得把經寮中行不得垂經帶不得出聲不得背靠板頭古云出聲持誦吵噪稠人背靠板頭輕欺大衆坐禪預歸堂不待打板抽脫古例披五條巾搭左手或無巾解絛繫笐上摺挂絡直裰令整齊絆定仍各懸尺許為記認不得在外催逼不可共人語笑右手提水入廁換鞋不得參差安淨桶當前鳴指三下驚噉糞鬼蹲身須正不得努氣作聲不可隔壁共人語古云戶局只合輕彈指人擁那堪亂作聲入處用籌分觸淨出時須水忌縱橫不得以水澆兩邊洗淨護大指二指不得多使籌子古云浴湯小使籌子休拈有者使了洗安廁邊空處人多防衆不宜也淨桶仍安舊處乾手將內衣入袴口出門右手提桶換鞋濕手不得拏門扇并門頰右手挑灰後挑土濕手不可拏灰土不得吐唾和泥洗手須用皂角洗至肘前出廁入廁須逐一念真言入廁唵恨魯陀耶娑訶洗淨唵賀曩密律帝娑訶洗手唵主迦羅耶娑訶淨身唵室利醯婆醯娑訶去穢唵枳羅腦迦吒娑訶按律小遺亦洗淨用水漱盥仍嚼楊枝歸堂坐禪火板未鳴不得先歸堂齋前不許洗衣齋前參後不可開函匱急切須白主事人衆寮登衣閣白寮主上名打板三下上閣開籠僧堂內不許共人語笑況看册子不得上下間行不得穿堂直過不得席上穿針穿錢不得床弦垂足坐床前一赤為三淨地一展鉢一安袈裟三頭所向不得床上行不得跪膝開函匱不得腳踏床弦下地草履遊山不許經行佛殿古云衩袒不許登殿草履莫踐法堂回互耆宿赤腳不許著僧鞋不得把手行談世諦是非古云別了雙親棄本師訪尋知識擬何為不曾説著宗門事白首無成過在誰不得殿前倚靠欄干不得猖狂急走古云行須緩步習馬勝之威儀語要低聲學波離之軌範殿塔內不許間行古云無事不須登佛殿等間休向塔中行不因換水添香火縱有河沙福也傾齋了洗衣不許衩袒不得傾用湯瓶竹竿尉斗使了仍安元處濯足不許爭盆如有瘡疥須落後或屏處洗之各行方便免動衆念莫待打板次第歸堂坐參了各出半單下地或大放參首座寮前板鳴即轉身面外赴衆須及時小板鳴不許入堂不得堂外立住持首座出堂下床問訊各就桉位藥石不得先起盛食不得呼索食畢出寮不許出三門不得入小寮不得衩袒歸僧堂并廊下行莫待打出寮板預披衣歸被位坐禪期成道業黃昏鍾鳴合掌念偈云聞鍾聲煩惱輕菩提長智慧生離地獄出火坑願成佛度衆生不得弄數珠不得共鄰單語笑鄰單生疏善言誘諭勿起嫌心不得前門出入喝火過放禪下地抽脫淨手不坐再請禪待首座開枕睡重者方就睡袈裟以巾褁安枕邊今安腳下於理不便辦道兄弟晝三夜三正好用工禮拜燒香須待更深懺悔求願起坐不可驚動鄰單睡須右脅仰為尸睡覆為淫睡多惡夢如開浴浴具擕右手須下間入浴院門內問訊目視空處歸位須揖上下肩了先搭巾次搭五條笐上展浴袱取浴具放一邊解上衣脫下裳以腳布圍身繫浴裙裩袴摺袱內次挂直裰與五條一處繫定上衣入袱包已拖鞋入浴古云三通浴鼓入堂時觸淨須分上下衣語笑高聲皆不可莫將粗行破威儀不可赤腳入浴室浴須下間空處待次而浴上間讓頭首耆宿故也勿令湯水濺人身上不得桶內泡腳不得室內小遺洗僻處不得將腳閣桶上不得槽上揩腳不得語笑不得戽水不得掇桶澆身當遮護渾身不得水濺拭浴人身上不可多用湯水腳布不可離身有腳不入桶者或洗炙瘡用疥藥宜後入浴不得將公界手巾拭頭面出浴須揖上下肩而坐次第著上衣先以直裰披身遮蓋即著下裳解裙衫腳布須安裙衫中免濕袱角不得將濕腳布搭手上仍揖左右而出堂看有設浴施主隨意課經回向團爐向火先坐團凳轉身面火問訊就坐不得脫鞋凳外不得弄火筯香𢁈不得撥火不得挨肩交頭語笑不得煨點心不得烘鞋襪不得彈垢膩火中不得烘衣被不得攪起直裰露袴口禮儀疏怠有動衆念日用軌則聊筆其略赴衆法律各有條章舉措看他上流慎勿隨於庸鄙叢林貴要整肅一日三省吾身自古今佛祖可曾一髮輕違者哉匪敢聞於宿德聊筆策於初機茲不贅聞統祈照悉慕十威儀頌笑翁和尚力行古道第恐學者逾越規矩之外筆示十頌簡而易知深意有在也日亦然兮夜亦然睡時宜後起宜先收單摺被候開靜動止回旋向左肩晨朝洗面莫猖狂盥漱低頭少使湯頭若癢時須待浴手巾乾淨不相妨禮拜看經遣睡魔不須將此當嘍囉一朝突出娘生眼執藥方知病轉多寂靜身心展鉢時出宜先筯入先𢁈食巾收摺須臨後左右和南禮莫虧粥了和南齋了茶放參藥石莫喧譁出堂入戶清規合要見叢林有作家入室升堂念誦時從規自合具威儀近來一輩無羞耻直裰中間小袖兒座元門首板丁當是甚禪和敢入堂油罰百錢猶自可高懸一榜最難當脫著衣衫貴整齊掩門須緩放籌低密持呪語輕彈指淨桶常將右手提入浴披衫貴靖恭需湯擊板合從容不應腳布安槽上雙腳如何著桶中頂笠挑包號水雲尋師切勿嘆辛勤法門冷淡宜防護莫學尋常救火軍貞日用偈章夫釋子沙門心形異俗潛行密用凡聖罔知宿德耆年皆為剩語初機後學其可舍諸筆録大藏經中金口遺誡日用清規諸偈茲不重述願依而行之謹具于后睡時若就睡時當願衆生一切安穩得大自在起時睡眠始寤當願衆生一切智覺周顧十方登溷大小便利當願衆生棄貪嗔癡蠲除罪垢洗手事訖就水當願衆生出世法中速疾而往洗面以水法面得淨法門永無垢染登殿若見佛時得生礙眼見十方佛登閣上升樓閣升正法樓徹見一切瞻塔見佛塔時尊重如塔受人天供禮塔頂禮於塔一切天人無能見頂濯足若濯足時具足神力所行無礙洗浴洗浴身體身心無垢內外光潔受食若受食時具足成滿一切菩提施粥粥有十利饒益行人果報無邊究竟常樂施齋三德六味施佛及僧法界有情普同供養食齋若小飯食時當願衆生粥禪悅為食法喜充滿食訖食已訖所作皆辦具諸佛法受一切若受味時味得佛上味甘露滿足摘草淨摘草手中挪還同水上波手此處無淨水淨處薩婆訶禮佛能禮所禮性空寂感應道交難思議我此道場如帝珠諸佛菩薩影現中我身影現諸佛前頭面接足歸命禮讚佛容顏甚奇妙光明照十方我昔曾供養今復還親覲還經琅函歸寶所了義實難思願共諸衆生同入薩婆海請經三塗永息長時苦六趣休隨汩沒因無邊含識悟真如一切有情登彼岸開經無上甚深微妙法百千萬億難遭遇我今見聞得受持願解如來真實義下佛天供呪唵摩休陀羅細娑婆訶五觀一計工多少量彼來處耕墾布種收穫舂磨淘汰炊煮二忖己德行全缺應供坐禪看經教營三寶事全又云得無賊果全應供出入緣故缺三防心離過貪等為宗出家之人防心有三過上味起貪中味起癡下味起嗔不知慚愧墮三惡道地獄餓鬼畜生也貪上味為宗四正事良藥為療形枯人身地水火風四大假合一大不調則生百一種病四百四病客病飢渴為主病須假飲食為之療治五為成道業故應受此食若不假飲食則無力進道故應受此食營三寶事十利一色二力三壽四樂五詞清六辦道業七宿食消八風除九消飢十消渴三德一輕軟二淨潔三如法六味一甘二辛三鹹四苦五酸六淡潔月分標題正月分殿堂香燭茶果供養官屬檀越致賀門狀或兩序進退山門一應禮節輕重合宜不可違例庶免敗缺之誚隨方毗尼毋易毋局二月望佛涅槃循例堂司行者率衆嚫錢送匱頭造供養早晨先於藏殿拈香轉藏行道諷經祝壽諸方例閉爐若山寺深寒不在此限三月分寒食屆期祖堂祠堂鋪陳供養照例諷經掃灑祖塔禁採茶笋蔭𣝡山林維那當出草單四月旦鎖旦過門若告香預排圖免告香亦須普説佛誕庫司嚴設毗藍園浴佛諷經出圖帳排被鉢位方丈呌喚江湖點心維那備香燭十二日衆寮煎湯起楞嚴十三日大殿起楞嚴大衆俱有拜五祖和尚力行之今以香燭礙不拜非法也十四日小座湯罷土地堂念誦僧堂煎湯藥石小參十五日結制上堂十六日晚秉拂僧堂下暖簾上涼簾五月分建青苗會預出諸寮經單梅雨愆期開溝整漏挂僧堂帳方丈點夏茶兩班單寮各作一日諸庵塔中有老成亦當溫存六月分酷熱頭首抽被中夏做面兄弟坐臥不拘生死事大克期取證住持時時鞭逼學者此非細事松源大川笑翁和尚長夏中陪衆晝三夜三曾不小間維那提點打炭團晒僧堂薦七月分十二日衆寮散楞嚴十三日大殿散楞嚴十五日解制建盂蘭盆會預出諸寮經單報父母恩八月旦開旦過門知客晒席薦糊窗延迎方來兄弟出入參訪裝寒覲省慎勿失矩遺規九月旦諸方大相看挂搭打板坐禪排整被位糊窗上暖簾十月旦開爐常備炭火初五日修達磨忌十一月長至節照例辦冬齋官屬檀越循例饋送十二月佛成道住持計算錢穀簿書搬量米麥五味之屬或兩序進退每事循例世法佛法其揆一也男百丈和尚沙彌受戒文當寺行者初受度牒以柈袱托呈本師兩班各處插香禮三拜選日設供剃度按律選處設座令於露地香水灑之周匝七尺四角懸幡今時多在大殿須面佛或相對設座若法堂中須設像幡花香燭如儀今僧堂維那和會戒師梵師引請侍者隔宿剃頭須留周羅頂心髮次日鋪設戒師座與住持分手卓上安手磬淨瓶戒文戒尺對面設梵師位卓上安大磬一口聖僧爐前鋪排袈裟直裰度牒自行堂鳴鈸引迎剃頭人自行堂土地堂祖堂佛殿各處炷香禮三拜列立僧堂前鳴鍾集衆戒師梵師入堂大展三拜入位引請侍者入堂聖僧前問訊至戒師前大展三拜胡跪合掌問云僧集不答云已集和合不和合僧今和合何所作為為當寺行者剃頭受戒可爾引請收坐具起身鳴磬引剃頭人入堂聖僧前三拜次戒師前三拜了就跪梵師作梵云神仙五通人作者於呪術為彼慚愧者攝諸不慚愧如來立禁戒半月半月説以説戒利益稽首禮諸佛云何梵云何於此經究竟到彼岸願佛開微蜜廣為衆生説作梵者止息喧亂也梵訖云為剃頭受戒者説戒師起身大衆下地戒師執爐白云戒香定香解脫香解脫知見香光明雲臺遍法界供養十方無量佛十方無量法十方無量僧見聞普熏證寂滅為剃頭受戒者説即將今辰剃頭受戒開啓功德先願皇帝萬歲臣統千秋天下太平法輪常轉伽藍土地增益威光護法護人無諸難事十方施主福慧莊嚴合道場人身心安樂師長父母道業超隆剃頭沙彌修行無障三塗八難咸脫苦輪九有四生俱登覺岸仰憑大衆念清淨法身毗盧遮那佛十聖號了大衆就坐引請侍者秉爐白云請師言句汝合自陳汝若不能隨我聲道凡稱某甲處當稱自己名大德一心念我某甲今請大德為剃頭受戒阿闍梨願大德為我作剃頭受戒阿闍梨我依大德故得剃頭受戒慈愍故剃頭人禮一拜第二二慈愍故禮二拜第三三慈愍故起身禮三拜胡跪合掌戒師云善男子即應諾云心源湛寂法海淵深迷之者永劫沉淪悟之者當處解脫欲專妙道毋越出家放曠喻如虗空清淨同於皎月修行緣具道果非遙始從克念之功畢證無為之地所以大覺世尊捨金輪之寶位子夜逾城脫珍御之龍衣青山斷髮容鵲巢於頂上挂蛛網於眉間修寂滅而證真常斷塵勞而成正覺三世諸佛不説在家成道六代祖師阿誰行染度人所以佛佛授手祖祖相傳不染世緣方成法器故得天魔拱手外道歸心上酬四重之恩下濟羣生之苦所以云流轉三界中恩愛不能脫棄恩入無為真實報恩者出家之後禮越常情不拜君王不拜父母汝今可離此座想念國王水土之恩父母生成之德專誠拜辭後不拜也就禮一拜引請侍者鳴磬引出堂外面北拜辭國王次拜父母各禮三拜想念親闈即換裙衫引入聖僧前三拜轉身戒師前一拜胡跪合掌戒師執瓶灌頂以指滴水少許於頂上把刀剃頭衆同誦偈云善哉大丈夫能了世無常俗趣泥洹希有難思議三説了沙彌退禮一拜引請引沙彌本師前胡跪合掌本師執刀云最後一結為之周羅唯師一人乃能斷之我今為汝除去汝今許不畣云可爾做佛事了大衆同誦落髮偈云毀形守志節割愛無所親家弘聖道誓度一切人三説就禮三拜互跪合掌本師持袈裟做佛事衆同誦偈云大哉解脫服無相福田衣披奉如來戒廣度諸衆生三説付衣披袈裟禮本師三拜禮聖僧三拜禮戒師三拜互跪合掌戒師云善男子法如大海漸入漸深汝既出家當先受三歸五戒方得近事大僧次受沙彌十戒乃可同僧利養事在專誠不得慢易我今為汝召請三寶證明佛事秉爐請云一心奉請無邊佛寶海藏金文十地三賢五果四向同垂感降共作證明三召云善男子欲求歸戒先當懺滌愆瑕如人浣衣然後加色汝今至誠隨我懺悔我昔所造諸惡業皆由無始貪嗔癡從身語意之所生一切我今皆懺悔沙彌三拜互跪合掌善男子汝既淨治身口意業歸依佛法僧寶歸依佛歸依法歸依僧歸依佛無上尊歸依法離欲尊歸依僧衆中尊歸依佛竟歸依法竟歸依僧竟如來至真等正覺是我大師我今歸依從今已往稱佛為師更不歸依邪魔外道慈愍故自歸依佛通誦三遍每一遍沙彌隨禮一拜至第三遍大展三拜就互跪合掌戒師云善男子汝既舍邪歸正戒已周圓若欲識相護持應受五戒盡形壽不殺生不偷盜不淫欲不妄語不飲酒是五戒相汝能持不答云能持上來五枝淨戒一一不得犯汝能持不畣云能持是事如是持沙彌三拜互跪合掌戒師云善男子五戒為入道之初因出三塗之元首次受沙彌十戒即形備法儀此稱勤策依師而住受利同僧是為應法沙彌應當頂受盡形壽不殺生不偷盜不淫欲不妄語不飲酒不花鬘瓔珞香油塗身不歌舞作倡故往觀聽不坐臥高廣大床不非時食不捉金銀錢寶是沙彌戒相汝能持不答云能持上來十支淨戒一一不得犯汝能持不畣云能持是事如是持沙彌三拜互跪合掌善男子汝今受戒之後當須頂戴奉持不得違犯所持戒律供養三寶勤種福田於和尚阿闍梨一如教法於上中下座心常恭敬精進行道報父母恩衣取蔽形不以文彩食取支命不得嗜味花香脂粉無以近身好色邪聲一無視聽徐言動止勿宣人短倘有爭者兩説和合男女有別草木無傷非賢不友非聖不宗法服應器常與人俱非時不食非法不言精勤思義溫故知新坐則禪思起則諷誦閉三惡道開涅槃門於比丘法中增長正業菩提心而不退般若智以長明廣化衆生祈成正覺用心如此真佛弟子戒師秉爐回向云上來剃頭受戒功德奉祝護法天龍伽藍真宰各軫威稜安神護法堂頭和尚常為苦海津梁執事高人永作法門梁棟合堂清衆同乘般若之舟剃頭沙彌速至菩提之岸四恩總報三有齊資法界有情同圓種智十方三世一切諸佛諸尊菩薩摩訶薩云云梵師鳴大磬云處世界如虗空如蓮花不著水心清淨超於彼稽首禮無上尊歸依佛得菩提道心常不退法薩婆若得大總持門僧息諍論同入和合海上來剃頭受戒功德無限殊勝良因散周沙界和南聖衆引請侍者鳴手磬至梵師作處世界如虗空沙彌即禮戒師三拜轉身禮聖僧三拜了問訊出堂外下手立引請同出堂戒師梵師聖僧前大展三拜出堂堂司行者鳴僧堂前鐘三下大衆下堂禮賀住持戒師梵師詣方丈致謝初展詞云𫎇差受戒不敢告辭人事荒踈有淹尊重二展詞云即日謹時恭惟堂頭和尚尊候起居多福觸禮三拜答云沙彌剃頭有煩神用侍者小師展賀大展三拜不收坐具進云沙彌得度舉衆同歡仰對尊嚴下情不勝感激之至又三拜寒溫三拜了收具次沙彌大展三拜不收坐具進前詞云某等叨圓頂相幸挂四衣不處塵勞永離愛網下情不勝感激之至三拜寒溫三拜收坐具次住持巡寮報禮次沙彌巡寮禮謝祇就沙彌寮安下俟時登壇受戒謝戒詞云某等獲登戒品濫廁僧倫仰荷芘休特此拜謝答云宿承佛記僧戒圓成堅忍受持力扶宗教次第參堂效新戒參堂沙彌得戒已覆住持參堂次稟首座維那早粥遍食槌後新戒參頭領衆入前門爐前排立問詞插香同展具三拜進云某等獲廁僧倫攀附清衆此日參堂下情無任戰栗之至退身同又三拜詞云即日恭惟堂頭本師大和尚首座尊衆大禪師尊候起居多福又同三拜收坐具問訊轉身住持前排立問訊面北巡堂一匝至外堂先下間轉上間歸堂內爐前問訊參頭引衆出前門才訓童行五參上堂罷當訓童行參頭行者令喝食行者報各局務行者行堂前挂牌報衆昏鍾鳴行堂前鳴板三下集衆行者上寢堂排立定參頭入方丈請住持出就座參頭進前插香鳴參同問訊九拜進前屏息拱聽規誨已又同衆三拜珍重而退預令寢堂裝香秉燭係侍者提調良行堂普説參頭預詣侍司插香禮拜稟侍者咨覆住持若允所請參頭即鳴板集衆排立寢堂參頭隨侍者入請住持出據坐參頭同衆問訊進前插香喝食行者喝云不審同衆禮九拜問訊參頭進云某等久思和尚示誨伏望慈悲開示因緣退身問訊而退次日行堂挂普説牌報衆面裏設座香几燭臺參頭報請兩班立班副參領衆門迎兩序入堂參頭堂主詣侍司同請住持下行堂衆接迎入堂據坐侍者一班問訊側立兩班如常出班問訊畢侍者燒香炷問訊住持請法亦如常參頭領衆鴈列插香喝參三拜退分東西班後鴈立諦聽法誨開示已參頭領衆如前排立三拜即出門外右立揖送住持兩班隨至寢堂插大香一片九拜而退次詣侍司插香三拜參頭副參同往兩班人前一一拜謝當免香禮知警衆法器夫鐘魚鼓板警衆朝昏不越準繩千古號令雲興水赴濟濟可觀禪寂深扃聞聲領解焚修赴衆整肅雍容及候依時終毋違失上殿下殿迎送官員尊宿諸山檀越施主念誦昏曉齋粥各鳴樓鐘曉鐘者破長夜警睡眠昏鐘者覺昏衢蘇蒙昧引杵須緩揚聲漸長每通三十五下起煞各三下三通總一百八下六道三塗停酸息苦如欲鳴鐘先念偈扣擊偈云願此鐘聲超法界鐵圍幽暗悉皆聞聞塵清淨證圓通一切衆生成正覺南無觀世音菩薩高僧傳云如法持念菩薩聖號鳴鐘聲震地府受苦之者皆得解脫又付法傳云罽賓吒王死作千頭魚常被劒輪斫首痛不可忍唯聞鐘聲劒輪不下晨昏扣擊厥功博哉僧堂前鐘者不以時限維那主之堂司行者須覆維那鳴之説法鼓轉三通小參長擊一通入室三下普説五下皆須緩擊小座湯特為茶各鳴一通退座三下秉拂一通若借座借鼓鳴法堂下間鼓齋粥二時鳴鼓三槌九擂上磉須三槌九擂鼓之號令各有其所升座小參普説法鼓轉藏有藏鼓開浴有浴鼓齋粥齋鼓茶湯茶鼓發更更鼓務令知時大普請齋粥打大木魚厨司普請小木魚開靜各鳴寮前板三通齋粥鳴大板三通木魚後鳴大板者名長板也若請茶湯須緩擊照應行禮請茶念誦三下方丈請茶湯鳴寢堂板庫司茶湯庫堂前板坐禪坐參鳴照堂板出寮入寮茶朔望茶湯早晨和南鳴衆寮前板報衆鳴諸寮前板殿堂行香各處有鐘不許亂倫乖違法令茲筆其略垂於無窮所謂鐘鳴鼎食三代禮樂備於斯矣禪苑清規始自百丈制禮作樂防人之失禮以立中道樂以導性情香燭茶湯為之禮鐘魚鼓版為之樂禮樂不失猶網之有綱衣之有領提綱挈領使無顛亂行之在乎師匠無其人則綱網衣領顛亂矣東林澤山和尚採前後尊宿講行叢規禮法品分十卷目曰禪林備用威儀細行詳釋盡美擬鏤板流通惜乎歸寂臨終囑門人付藏主竭力全其事將濟頽緒為千古矜式延祐丁巳解制日天童比丘雲岫謹題澤山和尚為見百丈清規日久傳訛乍入衆者易見難識鎚拂之餘托取古今宿德成現準繩行於世者曰禪林備用具載刊行流芳季紹光明盛大之傳又從茲始矣辛酉至治改元四月旦書育王德明
