body:
  text: 羌當代住持涅槃夫佛祖示滅棺殮禮儀有經無爽雙林十大弟子哭泣憂悔波羅奈釋梵天龍哀號躃踊泪如膏軸迦葉還自外國興兵分舍利建塔豈非禮乎按大慧竹庵議集云百丈喪禮而降至政禪師可謂備矣於應大師五圖芟繁實為法門備用百丈繩制凡亡僧衣物盡行支破營喪具奏以聞勑入藏為定式世尊住世時有古佛號烏波難陀示迹入滅世尊勑集衆將衣鉢對衆估唱使四衆觀察啓悟此身無常證二果者不可勝數蓋對治他緣當修己行先輩遷化紙袋封留法衣一頂備請住持非付法也以表世尊付衣待彌勒應世說法後之來者審所自也遐遺囑遺書尊宿示疾遷化可期預請兩班耆舊封定行李準留浴殮隨身衣服若小長物遺戒小師不許披麻慟哭請首座主喪一切佛事並免首座同衆舉無常偈云圓寂堂頭某人和尚即今將赴荼毗大衆舉無常偈衆念諸行無常是生滅法生滅滅已寂滅為樂三遍即起龕茶毗了了明明以驗生平若衣鉢豐儲王臣贈葬須盡禮講行衣鉢只留方丈庫司差公心㒒𨽻看守估唱了則已慎勿將無作有空費常住外護檀越諸山道舊遺囑遺書皆先畢事邇入龕念誦凡示疾書偈入滅不拘早晚侍者即令客頭行者下僧堂報衆白槌一下云堂頭和尚傳語大衆風火相逼不及面違又鳴槌一下次報諸寮堂司行者鳴僧堂前鐘集衆上方丈吊慰未可舉哀首座同兩班耆舊商議發書請人主喪須擇鄰封老成或法眷尊長或只請首座如有遺命即當遵行孝子侍者親隨人安排洗浴著衣淨髮入龕遺偈貼龕左維那孝子就方丈炷杳請首座做入龕佛事安排寢堂置龕爐燭几筵供養至時鳴僧堂前鐘集衆舉入龕佛事已維那念誦云切以美權普示分化迹於人天妙體獨存起玄機於佛祖恭惟堂頭和尚孤圓智月俄𠬧萬水之波廣大悲心却應十方之感瞻顏無地披志有歸是集真徒讚揚聖號為如上緣念清淨法身毗盧遮那佛十聖號了舉大悲呪回向云上來念誦諷經功德奉為堂頭和尚無生報地妙極莊嚴十方三世一切諸佛再舉楞嚴呪回向云諷經功德奉為堂頭增崇品位當夜集衆念誦云白大衆堂頭和尚已歸真寂衆失所依但念無常慎勿放逸為如上緣念十號回向同前二時上粥飯三時上茶湯大衆諷經見職維那回向一主喪夫主喪者非老成宿德詎可當其請如圓悟與開福寧和尚接月菴果承當後事實為標格主喪人至鳴大鐘大衆門迎至龕前炷香了兩班大衆人事衆散兩班耆舊送客位兩班插香人事當辭免主喪主位首座分手首座起身燒香一炷復位獻茶孝子即排前問訊插香大展三拜主喪畣拜次方丈行者禮拜次參頭領衆插香禮三拜次方丈㒒從參拜了獻湯送兩班出半齊庫司備點心兩班光伴次第巡寮體請佛事巡寮已兩班耆舊孝子隨到客位呈衣鉢簿遺墨等物主喪就會茶議請佛事式列後及請喪司一行人先議孝服無布折量分俵如主喪路遠三日未至請次頭首移龕佛事主喪至須與首座私計衣鉢多少作三分約一分俵衆人經錢齊錢謝喪司一行人一分佛事孝服喪司日逐支遣一分做齊出喪諷經須與首座同主其事主喪者只可舉哀小參二佛事帶行僧行不可干預執職并佛事衣盂豐甚議請鄰封老成本寺耆舊西堂首座每日俵嚫諷經奠茶湯不拘兩班大耆舊各請一人管財庶絶浮議接客喪儀亦請耆舊喪司書記維那知客從衆議公請聖僧侍者把帳喪司公差庫子客頭茶頭一行人管事仍請見職維那同議請佛事見職知客門接外客喪司合千人㒒排單揭示移龕舉哀率移龕入龕後三日掩龕庫司措辦事儀法堂上間顏色幃幕嚴設床榻架列受用衣物左右砂羅器具桉上列筆硯語録爐瓶供養湯瓶火爐茶湯皿具執役行者看守中間廣設祭筵生絹幃幕鋪設法座挂真以備上祭下間置龕麻布幃幕座安位牌前列几桉素花供養二時下湯茶粥飯諷經香燭不絶排列挑燈鐃鈸花幡鳴鐘集衆做佛事已移龕下法堂請鎖龕佛事賓挂真舉哀致祭奠茶湯移龕已即法堂挂真佛事了侍者捧遺書呈首座主喪大衆云堂頭和尚臨終遺首座大衆書主喪接書呈首座首座以書爐上熏即授維那讀畢喪司行者貼法堂中間上手幕上主喪白云堂頭和尚歸寂理合舉哀佛事已舉哀三聲大衆發哭孝子列幕下哀泣主喪炷香請奠湯佛事喪主致祭知客宣祭文已請奠茶佛事孝子列真前禮拜已歸幕下主喪再炷香禮真孝子皆答拜主喪入幕下吊慰孝子隨禮三拜次慰兩班大衆詞云法門不幸堂頭和尚遽戢化權敢冀大衆玉成後事首座詞云倚賴和尚玉成後事兩班大衆慰孝子詞云山門不幸和尚歸真旦望節哀以盡大事歸祭次挂真已喪司具目子列排祭次貼法堂下間幕上式見後每日兩次或三次上祭諷經諸山檀越致祭不在此限也若法眷嗣子上祭備孝服到門內知客接已即報喪司送孝服而後上祭助葬儀物用了餘者當歸常住蓋諸山轎從皆擾常住也喪司集兩班耆舊抄劄衣鉢見數從公議留遺囑外喪司默計新舊短長價貫多少庶臨時成現王對靈小參念誦奠茶湯挂真已維那同孝子詣客位拜請主喪逮夜逮夜者乃宿夜法堂面真設座對靈小參昏鐘鳴鳴鼓集衆兩班出班如常式無親隨人聖僧侍者燒香小參了孝子羅拜致祭首座即領衆龕前上香山門維那念誦式見後舉大悲呪回向山門知客平舉楞嚴回向了兩班奠茶湯致祭別靈次孝子致祭諷經衆散參頭領衆喝參禮拜諷經作下寮參拜聲喏諷經方丈行者參頭大衆參隨人力守夜鳴出喪挂真奠茶湯喪儀津送之禮應須合節計衣盂之多寡審天氣之炎涼十日半月取於事辦也知事喪司提調喪儀香亭真亭幢幡唄樂裝習十大弟子列龕左右龕前傘椅書籠湯爐挑燈竹篦主大拂子香合法衣孝子隨龕鳴樓鐘木魚鼓板送喪龕至山門首綵亭挂真有佛事奠茶湯有佛事兩班大衆門列俟龕出已山門維那面裏傘下合掌而立舉念往生呪或四聖號主喪領衆兩兩排行送喪左右分雪柳柴枝毋得挨肩交語各懷悲感喪司維那都寺押喪知客侍者俵行喪剽頭鳳秉炬挂真喪至涅槃臺喪司維那俟都寺炷香了進前燒香請秉炬佛事佛事已念誦喪司知客平舉楞嚴呪回向式並見後次鄉人舉經大衆須同諷念了首座領衆歸寺齊鄉人法眷孝子伴燒龕收骨齊了集衆備從儀迎骨回寢堂挂真供養諷經二時上粥飯三時上茶湯或十日半月衆到諷經骨入塔則止之在入塔至日備儀從集衆請起骨佛事送骨至塔所入塔有佛事諷經了迎真回寢堂挂真供養主喪炷香禮真次諸山兩班大衆孝子禮真畢孝子插香大展三拜謝主喪次兩班大衆謝主喪詞云山門不幸先堂頭和尚示寂仰荷主盟後事主喪云仰荷匡扶得逃曠敗主喪同喪司一行人巡寮致謝次孝子巡寮拜謝維那送見職守喪侍者歸衆寮每日山門三時上茶湯集衆諷經牌位入祖堂則止之或待新住持方入祖堂樹全身入塔喪儀如前只分雪柳入塔念誦式見後呪塔諷經回向式具后迎真回寢堂供養白唱衣衣鉢新舊價直高下默已估定上單見數於法堂上間敷設坐位外橫安長㸠筆硯大磬鳴僧堂前鐘集衆主喪首座分手兩班垂手坐大衆次第分坐喪司維那知客面主喪位念誦式見后先開籠出衣鉢依號排席上請提衣佛事語絶維那即白云夫唱衣之法蓋稟常規高則不過七分八分低則不過一唱二唱且道不作貴不作賤又作麼生商量提衣云一唱五伯若不請佛事即提衣云如來正法眼金襴僧伽梨展開也通變大千斂聚也絲毫不隔蓋千尺之軀不長覆丈六之身不短雖然庾嶺傳來爭奈今日猶在示寂某人和尚化緣已畢撒手便行信手拈來對衆估唱提衣云一唱五伯若法衣多總留遺囑次第呈衣維那接唱喪司合干人貴在公心主行維那眼親手辦定價打磬庫子目視上下喝定名字上單侍者依單發剽唱衣畢結定鈔數主喪僉單交鈔取衣不得順情退減主喪力主其事駒管待預在抄劄時作三分料定下遺書入祖堂管待喪司一應執事人嚫利均平息紛爭也次山門管待主喪一行人有嚫兩班耆舊光伴如常管待禮同食孝服侍者小師麻布直裰兩班頭首苧布直裰主喪生絹直裰法眷親密尊長生絹直裰次法眷師孫生絹腰帛辦事鄉人生絹腰帛諸山生絹腰帛檀越生絹頭巾腰帛方丈行者麻布道服方丈㒒從麻布服巾衆行者苧布頭巾甲幹火佃麻布頭巾作頭麻布服巾場上祭資次知事頭首主喪西堂耆舊蒙堂前資老宿衆寮辦事舊侍者鄉人法眷莊頭庵塔小師師孫方丈行者六局行堂待詔方丈直廳方丈轎番老郎莊甲火佃修造諸色作頭有祭化念誦式宿夜白大衆堂頭和尚入般涅槃是日已過命亦隨減如少水魚斯有何樂衆等當勤精進如救頭然但念無常慎勿放逸恭裒大衆肅詣龕幃誦持萬德洪名奉為增崇品位念清淨法身毗盧遮那佛十聖號了舉大悲呪回向云上來念誦諷經功德回向示寂堂頭和尚伏願不忘願力再現曇花棹慈航於生死逝波接群迷於菩提彼岸再勞大衆念十方三世云云起龕金棺自舉繞拘尸之大城幢旆搖空赴茶毗之盛禮葬則云難提仰憑大衆稱念洪名用表攀違上資覺路念清淨法身十號了便起行化壇堂頭和尚化緣已畢遽返真常靈棺遍繞於拘尸性火自焚於此日仰憑大衆資助覺靈南無西方極樂世界大慈大悲阿彌陀佛十聲上來稱揚聖號恭讚化儀體格先宗機峻不容於佛祖用開後學悲心乃攝於人天收幻化之百骸入火光之三昧茶傾三奠香爇一爐奉送雲程和南聖衆全身入塔切目雙趺示相紹靈鷲之遺規隻履顯宗表少林之垂化呈機隱顯成法始終仰憑大衆資助覺靈南無西方極樂世界十號了惟願慧鏡分輝慈雲廣布四生界內開示不生不滅之因六趣道中談說無我無人之法茶傾三奠云云同前法嗣切以恩逾鞠育義越遺金鬻心未就於鳳棲鼯鼠遽飛於鶴樹理畢竟於生滅孝當悼於莊嚴薄具薦修聊伸攀慕伏願定力矗地摩雲之聳其祚增高法海滔天沃日之波其囦愈廣再勞大衆念十方三世一切諸佛云云小師粉骨碎身略未酬於攝受殞星徹電忽奄入於死門追趨庭之訓何懸念封樹之嚴愈遠仰瞻覺苑無任悲哀伏願升禪大地流智水以潤枯林開道回心印曉月而光重疚再勞大衆念十方三世云云入塔諷經回向上來諷經功德加持寶塔有大功勛劫石可銷威稜益振祥光普燭幽暗頓明盡令沉滯之徒俱登菩提之岸十方三世一切云云被兩班悼住持五葉聯芳福慧資於幽顯隻履垂化悲哀動於林泉雖法化無有去來在輔𢏺合伸薦悼伏願眉間毫相舒剎剎之光明舌上風雷說塵塵之記莂草遺囑式某寺住持某年幾歲世緣報謝風燭不停所有隨身衣鉢檀信施利非常住物煩兩班抄劄端請某人主行喪事餘俵衆僧看經行喪母致煩多侵常住用幸察此意幸希悉及年月日住山某人押大意若此不拘木佛事資次入龕移龕鎖龕法堂挂真舉哀奠茶湯對靈小參山門首綵亭挂真奠茶奠湯秉炬安骨提衣起骨入塔入祖堂全身入塔撒土衣鉢豐每日奠茶湯一次賴估唱衣單式堂頭和尚歸寂謹具衣物估唱鈔貫收支干后一天字一天二一天三右具如前公支外見管若干齊七追崇看經俵衆外餘無剩伏希衆悉今月日喪司庫子某甲具繳納度牒狀式某寺知事僧某甲右某甲本寺住持長老於今年某月某日因病順寂遂於幾日依法茶毗或安厝平日所得施利置到衣鉢對衆估唱津送後事所有本名度牒一道謹具狀繳申某處官司伏乞照驗謹狀年月日某寺知事僧某狀訃狀式某寺喪司比丘某甲右某甲山門不幸堂頭和