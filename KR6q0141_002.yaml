body:
  text: 廬山東林太平興龍禪寺住持比丘一咸編辰坐禪每日粥了堂司行者先覆首座僧堂衆寮前各挂坐禪牌報衆令供頭僧堂內裝香點琉璃堂司覆首座鳴衆寮前板一下大衆即歸被位坐禪堂司見被位有太半人覆衆頭首鳴第二下板少緩鳴第三下板寮元閉衆寮門覆首座坐禪鳴首座寮前板三下初下首座出寮門二下約半途三下將入僧堂門聖僧前燒香一炷自下間至上間巡堂一匝歸被位謂首座曾出世先上間同住持者非法次覆住持坐禪鳴方丈前板三下詳緩與首座同住持入堂燒香一炷巡堂一匝歸位兄弟方許起身抽脫又須看上下肩位或先起者待回方可起身免見單位空踈近日兄弟置袈裟在被上竟去間處打雜相習成風深為痛借堂中單位空者住持首座須當撿察如衆頭首起位抽解惟前堂首座從住持面前出入其餘皆從出入板出入供頭候可開供時堂司行者覆首座云放禪堂司行者從聖僧龕後右出前門撑起簾下坐禪牌撼聲覺衆堂司右立俟問訊住持首座衆頭首出堂或遇迎送或有普請或送亡或淨髮則皆不坐禪宿坐參至午後堂司行者覆首座坐參僧堂衆寮前各挂坐參牌僧堂內裝香點琉璃打板坐參覆衆頭首覆住持打首座寮方丈板各三下並與坐禪一同但促鳴板耳蓋不起抽解故也放參粥熟堂司行者覆首座放參行者轉龕後右出前門鳴僧堂前鍾三下住持出堂次首座衆頭首出堂大衆和南問訊下床各出半單歸衆寮喫粥前輩坐參不待鳴板先歸堂坐集衆坐故方丈不鳴板也放參住持頭首同歸衆寮藥石今也不然甚失古意若晚參堂司行者不覆首座不鳴僧堂前鍾方丈客頭鳴法堂鼓住持出堂首座頭首領衆隨至法堂或寢堂隨方毗尼上座坐定侍者出班兩班東西堂各出班問訊晚參畢衆散各歸寮藥石若大放參堂司行者鳴首座寮前板三下大衆轉身面外坐首座離被位下地徑從住持面前出後門復轉從前門入堂聖僧前燒香一炷從下堂至上堂巡堂一匝歸被位坐堂司行者即進首座前問訊云堂頭和尚今晚放參堂司行者復從聖僧厨後轉右出僧堂前令喝食行者進前門限裏中立問訊長聲喝云放參鳴堂前鐘三下大衆和南首座曾出世先下地出門次住持出堂頭首出堂衆僧各出全單下地歸寮藥石諸方謂放參不披袈裟轉身方搭衣非法也唯徑山寺古規不墜披衣坐參當力行之或不坐參供頭出首座單每日首座下地後堂首座與次頭首伴衆摺被前堂被係供頭摺蓋參罷衆寮前鳴板三下出寮歸堂昏鐘鳴次頭首先入堂首座待鐘轉二通入堂燒香巡堂歸位次住持入堂定鐘鳴住持出堂次頭首出堂如坐再請禪住持後門入歸位不巡堂頭首隨衆或抽解者即歸被位更深住持從後門出次第頭首下堂開枕睡重者就睡道念兄弟不以此拘三板鳴衆起聖僧侍者堂內牽手巾驚酣眠者洗面衆歸堂已先首座次住持入堂燒香巡堂歸位四鼓住持出堂行香鐘鳴首座下地僧衆換衣換頭袖抽解即歸守被位鐘絶開小靜方可摺被為生死事大禮拜燒香亦雜用心也列五日上堂若尊宿相訪不拘時五參上堂座不敷設兩序徑歸班立小參禮同開發學者致謝道舊古宿朝夕激揚此道晚參曾不越宿今時遇五上堂單提正令亦不易得也衆僧凡遇升堂各賫坐具禮不可廢侍者隔宿通覆致謝來客多則具目子失記名者須用提起早晨侍者令客頭挂牌報諸寮尊宿若致謝官員當對座設位住持趺坐了令請客侍者揖引入位官客受禮而已坐則妨衆也張小參百丈謂之家訓古法只就寢堂針誨垂示委曲提撕若其緘口亡言倚目玄綱墜地前輩時時激揚宗旨開發後昆楊岐逼慈明晚參豈為他哉汾陽以夜寒罷參胡僧至而請之頌云胡僧金錫光為法到汾陽六人成大器勸請為敷揚今之四節臘敘謝兩班執事非古法也凡遇小參放參不鳴僧堂前鍾午後侍者令客頭報寮挂牌昏黃行者覆侍者次覆住持鳴鼓茶頭秉燭裝香侍者離班出法堂候衆集兩班徑歸位立定無對座問訊侍者入請住持出據位小參鼓鳴一通鼓鳴衆即集法堂出班並五日升堂禮同結座住持記請頭首秉拂單寮四寮并雜職一一敘陳委曲詳盡失記處侍者提起庫司預備湯果送上方丈下座客頭行者喝請云方丈請兩班西堂單寮大耆舊𫎇堂侍者禪客即今就寢堂獻湯云參前出免人事榜客頭貼僧堂前上間榜式來日結制解冬年升堂罷普觸禮三拜人事並免到方丈伏希衆悉住山某咨稟寒入室開大爐鞴煅煉方來真正舉揚克盡厥責曉昏不拘時也近代三八聊應故事漸寂無聞可不痛心耶凡開室之時粥前侍者令客頭行者衆寮僧堂前挂入室牌寢堂設達磨像前列香燭拜席客頭敷設室內茶頭秉燭裝香拜席設左側喫粥下堂不諷經客頭即緩擊鼓三下住持達磨前炷香三拜侍者隨後拜據室侍者當面問訊班左立行者問訊班右立頭首領衆達磨前各炷香三拜如班聯接首座後後至者須待次炷香展拜接排而立自右趲至室前不許攙先亂衆倫序侍者燒香一炷問訊出外揖首座舉左足入左手上香一炷進步當前問訊至禪椅右側立聽舉話侍者再揖次人入歸班立首座下語或不下語過禪椅右問訊退步觸禮一拜舉左足出揖次人入次第進退如品字勢若首座是大方西堂或宿德入燒香次住持當引揖送出升堂說過後次免之後堂領衆暫到皆當入室若大方西堂名德首座同參老成來預入室當下座辭免令侍者送出侍者最後入室已炷香列住持前大展三拜行者插香三拜按大慧竹庵雲門議集入室罷住持復出達磨前炷香大展九拜仰遵遺教俯謝證明令法久住來告香四月五日告香開示方來衆推參頭一人維那和會定同衆詣侍司稟云新挂搭兄弟欲求和尚告香普說敢煩侍者咨稟者云容某候覆却當相報方丈允已堂司預出告香圖依戒排寫式具後預集衆習儀堂司行者率大衆錢買香大小三片付參頭收至日侍者令客頭於寢堂或法堂鋪設罳椅子香几三隻燭臺三對當椅前一字間列外設小拜席堂司預晚挂告香牌牌左云告香罷普說逐一報寮至時諸寮鳴板三下衆集依圖位立侍者白云奉堂頭和尚慈旨出世西堂名德首座並免告香各備小香合坐具參頭同維那侍者入請住持出參頭歸位同衆問訊進前云請和尚趺坐參頭復位同衆問訊插大香一片復同衆問訊各大展三拜收具復問訊參頭徑右入椅側問訊稟云某等為生死事大無常迅速伏望和尚慈悲開示因緣住持舉話三則隨轉語了歸位問訊插香一片復同衆問訊就位叉手而立東西各三人出班東第一第二過東爐前第三人中爐前立西邊第一第二過西爐前第三人中爐前立兩兩炷香問訊東邊三人西邊三人徐行各巡接班尾三三出班叉手出班合掌歸位次第趲至元位各大展三拜不收具參頭進前云某等伏𫎇和尚慈悲開示下情不勝感激之至復位三拜進前云即日孟夏謹時恭惟堂頭和尚尊候起居萬福復位三拜各收具客頭鳴鼓五下兩班轉身立班參頭立西班下手東西轉身隨班對立聽普說竟仍各面裏立參頭插香同衆大展三拜免則觸禮三拜進云某等夙生慶幸獲𫎇和尚慈悲開示下情不勝感激之至普同問訊而退參頭領衆法堂下間謝維那侍者觸禮一拜次衆人謝參頭觸禮一拜請客侍者預日令客頭至堂司具新到戒次寫茶狀客頭備卓袱告香罷列法堂下間請茶備筆硯僉名請首座光伴齊退鳴鼓住持接衆人歸位立定兩侍者行禮與特為茶禮同當晚方丈請參頭維那侍者藥石首座光伴次早請參頭茶及請點心維那侍者同若大衆均預告香首座為參頭特為茶止請參頭兩班光伴住持入院後人事定庫司備香首座領衆詣方丈懇請為衆告香然後開室古法未預告香不許入室狀式某甲上座某甲上座依戒書名訖方丈和尚齊退就法堂特為點茶伏希雲集今月日侍司某甲請客侍者名拜請暑普說凡普說時侍者令方丈客頭挂普說牌於僧堂衆寮前并諸寮鋪設寢堂或法堂粥罷堂司行者覆侍者次覆方丈鳴鼓五下緩擊侍者出寢堂候衆集入請住持出據坐普說與小參禮同洞下尊宿每遇朔望衆寮設位為衆普說惟大慧和尚宗通說通不拘時節不擇方所也往念誦三八結夏依戒次寫圖至日僧堂前掃灑午後堂司行者覆方丈諸寮挂念誦牌分付鐘頭至參前撿點聖僧前及諸殿堂香燭完備先覆維那侍者方丈庫司首座頭首單寮鳴照堂板三下次巡廊鳴板再上覆方丈打板衆集依圖立定暫到侍者下肩立住持到大殿燒香鳴大板三下次鳴大鐘兩班預集僧堂外大板鳴方歸圖位次住持入堂供頭鳴堂前鐘七下住持聖僧前燒香侍者捧合請客侍者即往西班人前巡問訊請云方丈和尚請念誦罷寢堂獻湯請東班同就歸圖位立住持出堂前面外立燒香侍者隨出歸位維那先離位至門首面住持立合掌念誦畢歸班位住持入堂次首座入西堂隨首座後入在聖僧板頭立次頭首接後次第三三聖僧前問訊轉身問訊住持面北巡堂問訊依圖位合掌立暫到衆人末侍者隨後入至聖僧龕後面門立暫到面龕立次知事入堂巡問訊出堂暫到侍者隨出堂司行者往首座前覆放參從龕後轉出前門供頭鳴鐘三下住持出兩班隨出堂前謝湯下八赴湯𥨊堂鳴板侍者燒香行禮如常式湯罷藥石古法三八皆有湯上八中八則免藥石不坐參至晚坐堂則如常念誦式上八中八皇風永扇帝道遐昌佛日增輝法輪常轉伽藍土地護法護人十方檀那增福增慧為如上緣念清淨法身毗盧遮那佛十聲聖號了回向下八白大衆如來大師入般涅槃至今至治元年已得二千二百七十載是日已過命亦隨減如少水魚斯有何樂衆等當勤精進如救頭然但念無常慎勿放逸伽藍土地護法護人十方檀那增福增慧為如上緣念清淨十號秋四節念誦結制解制冬節歲除土地堂嚴設供養庫司客頭覆維那堂司行者覆方丈兩班諸寮挂念誦牌報衆禮與三八同衆集相對鴈立住持大殿炷香三拜鳴大板三下鳴大鐘住持至大衆合掌俯首迎之侍者當叉手隨行入土地堂燒香出外立維那爐前面外揖住持上香侍者捧合次兩班對出有借香問訊出班畢維那面裏念誦回向了鳴齊鼓一通衆歸堂赴湯與結夏茶禮同念誦式結夏切以薰風扇野炎帝司方當法王禁足之辰是釋子護生之日恭裒大衆肅詣靈祠誦持萬德洪名回向合堂真宰所祈加護得遂安居仰憑大衆念清淨法身毗盧遮那佛十聖號了回向云上來念誦功德回向當山土地列位合堂真宰所冀神光叶贊發輝有利之勛梵苑超隆永錫無私之慶再勞大衆念十方三世一切諸佛云云解夏切以金風扇野白帝司方當覺皇解制之辰是法歲周圓之日九旬無難一衆咸安誦持萬德洪名仰畣合堂真宰仰憑大衆念清淨法身云云至節切以時臨亞歲節屆書雲當一陽來復之辰乃萬彚發生之始恭裒大衆肅詣靈祠誦持萬德洪名回向合堂真宰仰憑大衆念云云除夕切以化工密運歲曆云周咸欣四序之安將啓三陽之慶恭裒大衆肅詣靈祠誦持萬德洪名回向合堂真宰仰憑大衆念清淨法身云云收請益投情請益先詣侍司詳稟侍者咨覆住持某甲上座今晚欲詣方丈請益如允所請定鐘後詣侍司伺候侍者隨住持坐處令秉燭裝香引入問訊插香一片大展九拜收具進前問訊云某為生死事大無常迅速伏望和尚慈悲方便開示肅躬側立下手諦聽法誨垂問來歷從實稟畣了進前問訊出爐則插香一片大展三拜謂之謝因緣免則觸禮次詣侍司致謝冬秉拂至日午後侍者令客頭携主杖牌拂僕𨽻托柈袱爐燭報上首知事維那同詣頭首寮炷香觸禮一拜申請云方丈和尚令某等詣寮拜請今晚為衆秉拂一一請已首座同受請次頭首令行者將牌拂主杖即詣方丈稟辭住持勸請了送出首座轉身借法座法鼓秉拂人即令茶頭行者請聖僧侍者禪客茶復燒香一炷云今晚秉拂煩侍者燒香禪客問話方丈分付客頭請頭首藥石參前齊赴堂司行者排辦法座前敷罣罳椅子設住持位昏黃時行者覆秉拂人次覆方丈鳴鼓一通衆集小參禮同住持歸位前立定都寺維那侍者同至秉拂人前問訊歸位秉拂人往住持人前問訊次從知事班上首問訊巡至班末轉同班上首問訊巡揖至班末舉手與大衆普同問訊即登座坐定秉拂侍者出班次兩班出班東堂西堂出班住持出班當起身受禮秉拂人云侍者請堂頭和尚趺坐侍者往住持前問訊登座燒香一炷提坐具問訊側立秉拂人索話問畣了提綱敘謝方丈合山衆已舉方丈小參公桉拈頌畢下座住持前問訊復元位次人如前行禮登座秉拂竟客頭喝請湯果下座即懷香同詣方丈拜謝就座湯果次日方丈請茶都寺辦齊併請茶半齊點心別日置管待上堂敘謝今諸方若解夏之熱除夕之寒免之廢禮後學無所觀望或請立班大方西堂在第三夜住持小參時委曲勸請舉揚隨息拈頌公桉相激揚此道豈細事哉
