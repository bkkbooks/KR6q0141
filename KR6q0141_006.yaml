寮供過填陪缺典之物遇亡僧時打入當庫司措辦公界眼對即抵號上簿或增添號庶免漏失每見多處進退之際動是什物缺典具單需索庫司付之不釆住持又不提點非任賢意為頭首者又當相體既居寮舍亦須整葺將更替時件件點對或者自留物件添號并留五味之屬便益後人此住院之根本後人之模範如其掃蕩一空貽誚有識得不愧心者哉方丈庫司僧堂皆各有簿交割僧堂物件維那時當提督須以眾人究心因錄及此
