body:
  text: 廬山東林太平興龍禪寺住持比丘弌咸編龍請立僧首座大方西堂名德首座人天師範言行相應一眾投情方可舉請其事嚴重委曲控陳如蒙允許集眾陞堂此間多眾須得當人相與建立法幢開大爐鞴以慰眾望山中幸有某人知見高明慧命所寄下座兩班大眾同伸拜請為眾開室伏望慈悲特垂開允下座方丈客頭陳設香几住持插香同眾攀請詞云大眾傾心久思示誨伏望慈悲特賜開允畣云既𫎇堅請不敢固辭普同觸禮一拜請已客頭行者呈納普說入室二牌先用拌袱盛之受已堂司行者收牌乃上方丈炷香觸禮致謝住持免禮謝詞云某甲幸獲依棲貴圖藏拙既𫎇見舉不敢有違畣云象駕既臨法輪常轉不合奉煩冀以法道為重為眾開示平交立僧詞云方圖侍誨豈復為人尊命下臨寸心多愧畣云佛法寄重仰丐埀情法眷參學詞云此𫎇旨揮令受兄弟問訊雖無深證不敢固辭下情無任愧悚答云既有餘光望以佛法為謝謝已堂司行者鳴僧堂前鐘大眾同送歸寮住持對觸禮一拜送出次與大眾人事更若名德之士受此請住持座上說及即抽身歸寮閉門下座領大眾扣門開門接住持入插香同眾觸禮一拜呈納普說入室牌次與大眾人事了維那詣寮議請侍者一人有處祇和會聖僧侍者燒香非法昔破庵和尚在徑山為立僧無準和尚為侍者後世其家蓋有由也挂牌普說鋪設照堂禪椅拂子爐燭鳴齋皷一通眾集立定立僧歸位維那出班問訊燒香一片眾同觸禮一拜當約免趺坐普說竟維那同眾觸禮一拜申謝立僧即詣方丈插香展具住持當免隨觸禮一拜畣前拜也參學法眷謝當兩展三拜詞云既𫎇使令勉顏承領慈悲包荒不勝愧悚次堂司行者引至庫司諸寮人事方丈俻草飯請特為湯藥石至晚湯果兩班光伴立僧侍者同席次早方丈請僧堂特為茶請客侍者具茶榜詣寮插香拜請與特為新首座茶同立僧當特為下手人茶與特為新後堂茶同別日方丈管待兩班光伴此職請受兩難皆當任重昔徑山蒙庵之請破庵靈隱松源之請掩室相激揚令法久住破庵室中舉話寶上座無啟口處遂即坐脫立亡遺囑頂骨舍利呈首座可謂了事丈夫殊不知破庵機路圓活卒難湊泊人所宗仰師請名德首座住侍須預稟露如有允意先方丈請茶兩班光伴即鳴皷陞座更不挂牌報眾住持委曲以佛法為念慇懃致懇下座同大眾觸禮一拜陳請鳴鐘送歸鉢位送歸寮並有觸禮一拜次兩班大眾作賀茶湯管待禮與前同進退不混兩班無交代也火兩班進退或解制或年夜為期隨處常式頭首人材當於夏中審知所學量才補職知事戶門事務莊庫歲計並須審細至職滿日預上方丈稟退擇人既定欲來日進退侍者密報兩班昏鐘鳴知事一班詣方丈插香普同觸禮一拜而退就中或再留者挑燈住持送歸庫司侍者燒香點湯五更鐘鳴頭首一班上方丈插香觸拜而退或再留者先一日晚住持詣寮侍者燒香點湯勉留請選頭首從眾名勝老成採議萬不失一也知事則訪問公心耆舊上手知事住持須著面和會已次諸職則委心腹左右人和會逐一預定方行舉請切見古人於東序一職最涉重荷為住持者近來多徇私情不擇可否請歸庫司靡不為也尅削常住豐己篾公凡供眾修造山門係重之事略不關懷誠可痛也觀此當集大眾協心公議名實相當者眾請龍神作證大小執職一例公同鬮拈庶絕私意叢林不致廢弛為住持者審諸前堂首座住持躬詣寮中侍者燒香點茶盡禮敦請乃叢林表率故也已次頭首亦預存恤至日進退侍者密覆住持具請人目子具名令客頭行者請茶候僧堂粥再請分差行者守請喫茶人到𥨊堂請西堂大耆舊光伴勸請舊知事一班候粥遍從後門入上首白槌一下云白大眾某等是𫎇堂頭和尚慈旨令歸庫司一年已滿心力疲倦告退歸堂謹白再鳴槌一下從龕後左出住持前兩展三禮初展云某等昨𫎇甄錄自愧非材下情無任愧悚之至二展寒溫觸禮三拜退身龕後右出聖僧前大展三拜轉身住持前問訊面北巡堂一帀中間問訊而退粥罷不諷經一一守請至𥨊堂住持接已獻茶畢躬起燒香一炷歸位序請意侍某拜白大眾前兩班告退不可缺人拜請某人充某頭首侍者呈目子住持白請訖至爐前侍者揖請新頭首一一至爐前受請如未允請眾耆舊力當勸勉已住持先觸禮頭首隨對觸一拜了白請知事一班訖頭首一班進前行禮初展云某等自慚匪器過𫎇甄錄下情不勝愧悚二展寒溫觸禮三拜住持各畣一拜住持復位分座喫湯新東西班住持對面耆舊上下間列坐侍者燒香下湯有處揖坐揖香揖湯非法此湯在當晚講特為禮也供頭斂僧堂前鐘大眾入堂內立新知事一班歸西堂對板排立住持送前堂歸鉢位對觸禮一拜次頭首隨對觸禮一拜次送後堂歸鉢位對觸禮一拜如缺前堂別日上堂說及後板方轉前板插單唱食住持歸位立定如維那知客退已侍者往住持前問訊側立住持付目子與之當面問訊從龕後轉槌邊白槌一下云前知事告退此務不可缺人適奉堂頭和尚慈旨令某人充某職謹白復鳴槌一下客頭即揖請新受職人一班至住持前觸禮一拜受職侍者白云請知事訖又鳴槌一下知事一班行禮初展二展詞語寒溫並首座同普同觸禮三拜住持畣一拜知事轉龕後右出聖僧前排立大展三拜侍者引至住持前問訊面北巡堂一帀歸中問訊橫退三兩步西堂板頭立堂司行者喝云新知事與大眾人事普同觸禮三拜又喝云大眾禮賀新知事普觸禮三拜又喝云新知事禮謝大眾普同觸禮三拜喝云大眾送新知事歸庫司供頭鳴僧堂前鐘送新知事前堂并維那舊前堂都寺乃止鐘知事一班庫司門外右立住持送入對觸禮一拜送住持出次與舊人交代舊居左觸禮一拜新轉左觸禮一拜各敘寒溫作賀首座領大眾至即接入問訊致賀送出喝云大眾送新首座歸寮右接住持入對觸禮一拜送出次交代互相賓主對觸禮一拜送出次頭首領眾致賀喝云首座大眾送新維那歸寮住持送入對觸禮一拜送出交代作賀同前又喝云請首座大眾送舊首座都寺歸單寮又喝云請兩班耆舊送後堂書記藏主知客歸寮逐一白送訖喝云送舊頭首知事歸蒙堂前資寮住持送入普對觸禮一拜送住持出居主位接侍者作賀送出接兩班大眾作賀送出居右位與寮主人事新舊兩班即詣方丈拜請新舊都寺首座各插香係庫司備送新舊兩序同巡寮半齋點心齋時草飯並就方丈西堂耆舊光伴莊庫職務不在覆替先審詳已就便請人寮元延壽堂主淨頭爐頭炭頭水頭列項雜職待請兩班了別日詣堂司告退擇道心人次第交替方丈問訊庫司人事隨例點心管待帝挂鉢請知事大慧簡堂道德崇重凡請知事先不和會粥罷堂司行者喝云請大眾小立維那聖僧前燒香一炷巡堂一帀往住持前問訊側右立接目子當面問訖龕後轉槌邊白槌一下云適奉堂頭和尚慈旨令某人充某職逐一白請訖客頭揖受請人至住持前受職與前禮同次會頭首耆舊茶勸勉請訖送禮並同前鳥侍者進退頭首退已侍者一班具威儀咨稟住持預當擇人請兩班已侍者一班詣方丈插香同大展三拜稟退住持批下堂司即令行者請受職人到堂司喫茶人至揖入炷香獻茶已再起身燒香一炷復位立白云適奉堂頭和尚慈旨令某甲上座充某職逐一白請訖受請人進前普觸禮一拜轉位獻湯維那行禮揖坐揖香揖湯請寮元光伴湯罷同上方丈接已侍者一班列立定燒香侍者插香同大展三拜了維那送侍者歸寮觸禮一拜送維那出與舊人交代頭首禮同方丈行者插香禮拜轎番直廳參拜若名德之士住持初接免行禮躬送入寮對觸禮一拜維那人事而已堂司行者引新舊侍者巡寮聖僧侍者別日維那入寮已即和會有道心兄弟充職維那引上方丈禮拜免則問訊而退隨例湯茶點心管待當日批下堂司請舊侍者茶送歸眾寮維那上首對觸禮一拜對轉觸禮一拜送維那出門次與寮元人事官方丈特為新舊兩班湯請客侍者令客頭備柈袱爐燭詣新舊前堂首座前炷香首座還香觸禮一拜還拜稟云堂頭和尚請參前就寢堂特為献湯次新舊都寺前炷香無拜詞語同前次兩班新舊并耆舊光伴客頭請釘挂寢堂鋪設位頭西堂首座光伴新頭首一班一出新知事二出舊頭首三出舊知事四出耆舊西班五出耆舊東班六出人多分接坐之燒香侍者預排照牌至時鳴皷客集兩侍者行禮小座湯禮同至晚湯果來早僧堂請茶新舊隨所請之無光伴如常式庫司請茶不及赴免之方丈茶罷同到庫司致謝半齋點心日次庫司點心庫司送舊首座都寺粥飯五味椀楪動用什物客頭照例分送三日送歸鉢位圖位與小座第三座六出位同人堂司特為新舊侍者湯茶草飯罷維那令堂司行者詣新舊侍者前一一申請并請聖僧侍者參前就寮献湯至晚堂司設位排照牌請寮元光伴催客鳴寮前板接入揖坐行禮與庫司湯禮同當在方丈特為之先妨侍者行禮也方丈僧堂特為茶罷堂司講茶禮新舊侍者次日詣堂司致謝皇庫司特為新舊兩班湯藥石草飯罷令客頭備柈袱爐燭上首知事詣新首座寮炷香首座還香詞云今晚方丈湯罷就庫司特為献湯伏望降重客頭請云湯罷就座藥石次請新舊大小職事耆舊光伴庫司釘挂設位排照牌西堂光伴無則耆舊首座位分六出新頭首一出舊頭首二出知事三出莊庫四出次第接排坐之新知事主位之下不赴坐新維那上首知事隣肩西班東班耆舊五出六出各依照牌立定都寺從一出頭一字問訊直巡遍中央問訊眾坐復進前燒香二炷從一出頭當面問訊巡至位末又當面問訊復從二出三出四出五六出如前問訊巡訖歸中問訊燒光伴香一炷就位坐與眾朝揖下湯湯罷起身新舊兩班上首各一人出詣爐前謝湯各抽衣就位藥石始送鉢位兩班退職三日後未開小靜時堂司行者人力挑燈請舊首座都寺就維那寮獻湯接入炷香下湯白意云清職既圓山門禮當延送鉢位維那預定鉢位板頭先送首座入鉢位對觸禮一拜次接都寺送鉢位對觸禮一拜問訊維那從前門而出首座都寺挂鉢過堂若名德西堂到寺挂搭住持請湯同赴堂送歸鉢位有東堂則送後堂分手板鉢位諸方前堂都寺挂搭讓本山一人次第間排後堂書記監寺藏主排副鉢位隨山門高下大川和尚住淨慈如此間排東叟石林二老祖住日同首座上板頭都寺下板頭制管待新舊兩班住持特為陞座敘謝新舊兩班下座眾進前致謝住持庫司預覆方丈製造食品請客侍者令客頭行者備柈袱爐燭香合詣新舊首座都寺處炷香陳請云方丈和尚午刻請就寢堂管待當還香次兩班新舊職事人并耆舊光伴並客頭請寢堂釘挂設位排照牌係燒香侍者提點未齋先催客齊集住持接問訊次接光伴人各入座依照牌立定兩侍者行禮巡揖坐燒香須分出頭揖香了下湯分出頭揖湯進卓侍者一班列住持前問訊入位下飯燒香侍者離位燒香一炷下嚫重輕照常式食了鳴鼓講茶禮侍者燒香兩侍者分出頭揖香揖茶與特為湯禮同但無揖坐一巡也茶罷爐前致謝住持送出次送光伴人文住持垂訪點茶山門茶湯禮畢住持齋罷垂訪諸寮點茶意在溫存照寮舍不便處什物缺典責付庫司措辨前堂寮知客寮茶頭人力例免普請維那寮人力結夏免普請諸寮人力普請不及公界須當詳審通容多因𤨏屑致傷和氣客僧到來不以時限齋過須當打飯延接庫廚執事不可懱裂茶湯五味隨宜均送紙筆果實之屬衣鉢侍者時當照拂住持事繁在左右賢賢可也字方丈特為新首座茶方丈管待了次早燒