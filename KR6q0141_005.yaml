body:
  text: 鹹煎點住持若法嗣到寺煎點令帶行知事到庫司會議造食計算錢物送納隔宿先到侍司咨稟命通覆住持具威儀詣方丈插香展拜請免禮則觸拜請云來辰就雲堂聊具菲供伏望慈悲特垂降重下情不勝感激之至稟侍者令客頭請兩班單寮四寮挂牌報請至日鋪設住持鉢位卓袱分手煎點人位火板鳴大衆赴堂煎點人隨住持入堂揖坐中燒香一炷住持前問訊轉龕後出住持引手揖煎點人坐堂司行者喝云請大衆下鉢食遍煎點人燒香下嚫問訊住持揖復位命人行嚫食畢厨司開齊袱鉢了退住持卓煎點人燒香一炷住持前問訊龕後出爐前問訊鳴鐘行茶遍往住持前勸茶復龕後出進住持前展具云此日薄禮屑瀆重辱降重下情不勝感激之至二展寒溫觸禮三拜畣一拜出堂送出煎點人復歸堂燒香一炷上下間問訊以謝光伴復中問訊鳴鐘收盞次詣方丈謝降重住持隨到客位致謝若諸山煎點齊辦同住持赴堂揖住持坐當免行禮揖煎點人歸位坐定起燒香一炷到住持前問訊下嚫俵衆人嚫燒光伴香一炷歸位行食茶禮則不講也茶罷同上方丈住持須先到客位致謝河兩班寢堂煎點至日煎點首座知事耆舊詣方丈插香拜請住持已次請侍者小師住持廟位兩班耆舊如常坐小師內坐至時首座請住持出揖坐行禮若免禮從爐右出燒香一炷進前問訊即下嚫首座同前三人問訊歸位坐食畢首座起身燒香免禮就座獻茶淡諸山寢堂煎點分手設位如常式煎點人詣方丈插香請住持已次令客頭請兩班耆舊蒙堂侍者小師光伴至時請出寢堂爐前略敘寒溫住持免禮則不揖坐也入位了燒香一炷下嚫住持起身揖煎點人坐食畢獻茶了爐前致謝降重住持送兩班幾步即詣安下致謝若辦事法眷小師煎點隔日詣方丈拜請及兩班耆舊蒙堂辦事法眷鄉人小師寢堂鋪設廟位餘人位次準常小師內坐請坐茶禮並與僧堂煎點禮同若法眷長上煎點餘禮並免但燒香下嚫而已鱗尊宿相訪山門探知到寺預報維那挂牌迎接到時先通門狀至方丈即鳴大鐘大衆門迎若免接禮潛入寺方通門狀寢堂裝香秉燭若法眷尊長即斂僧堂前鐘隨至方丈人事插香住持免之大衆未至先請坐侍者禮拜燒香喫茶衆至首座知事插香人事了侍者方插香禮拜客頭揖請兩班耆舊光伴喫茶茶罷帶行行者炷香禮拜次直廳轎從參拜方丈行者禮拜參頭領衆禮拜直廳轎番參拜了侍者燒香獻湯送客位主居右送入插香客辭免略敘寒溫而出兩班各插香人事參隨別送安下了客頭令備轎住持同引巡寮侍者隨行客頭預報諸寮巡已住持同入方丈敘話如鄉人道舊人事歸安下相接請客侍者具狀請特為湯詣客位插香拜請免則觸禮云方丈拜請和尚今晚就寢堂特為獻湯伏望慈悲降重呈狀了客頭覆云請和尚湯罷就座藥石寢堂釘挂排照牌設特為光伴位催客行禮湯罷藥石送出並前特為禮同客頭詣客位請云方丈請和尚今晚湯果請兩班光伴侍者覆來早上堂致謝次早請湯侍者燒香行者問訊僕從聲喏請粥了茶侍者覆上堂半齊點心首座衆頭首上方丈稟白勸請升座開示法要住持先到客位炷香陳意首座具狀兩班大衆同詣客位插香拜請云拜請和尚為衆開示次請方丈云拜請和尚引座堂司令行者報寮挂牌鋪設法座座下排二位至時覆鳴鼓住持同下法堂位前立住持先引座下座兩班詣尊宿前問訊尊宿往住持前問訊歸中普問訊登座兩班出班侍者登座問訊開示畢下座住持前問訊普問訊謝衆住持即詣客位插香拜謝兩班大衆隨詣插香拜謝請客侍者具狀請特為管待山門造食備嚫衣鉢閣備貼嚫燒香侍者行禮湯禮同兩班光伴若弟姪法孫泛常已下禮勿過勤貽笑作者湯狀當寺住持比丘某右某輒以今晚就寢堂點湯特為伏望尊慈特垂降重謹狀年月日當寺住持比丘某狀管待狀當寺住持比丘某右某輒以來日就寢堂聊備水飯伏望尊慈俯埀降重謹狀年月日同前兩班狀當寺首座比丘某右某輒以來日拜請舉揚宗旨開示後學伏望尊慈俯埀開允謹狀年月日當寺首座比丘某等狀可漏狀請某處堂頭和尚大禪師當寺比丘某等謹封潛諸山相訪若探知挂牌相接相見人事禮同前比近鄰封見訪止宿方講湯禮省事者徑到方丈免動衆迎接此古法也若法眷尊長垂訪請據廟位立定插香禮拜還法眷禮次講諸山相見禮方丈內坐當讓主位迎接如尊宿獻湯躬行禮力辭侍者行禮若嗣法辦事法姪相訪當躬至方丈住持即令鳴僧堂前鐘集衆人事先請住持廟坐行法眷禮次講諸山禮接送同前但特為湯管待不具狀請客侍者炷香陳請又看年臘高低臨時通變羽官員相訪山門挂牌報衆探候迎接將及門鳴樓鐘衆接入大殿拈香方丈獻茶湯了送歸客位請點心罷陪從游覽庫司備湯果祇待敘話中多談出塵之語山門稍有急切之事方便善巧言之別詣懇及若留宿須上堂致謝若即別鳴堂前鐘集大衆送出門翔施主請升座齊僧施主到門知客接見引上方丈獻茶湯送安下若官貴大施主當鳴鐘集衆接却請知事商議同上方丈炷香拜請升座至日鋪設法座座前設施主位挂上堂牌報衆鳴鼓集衆知客同施主上方丈請住持須備燈幡鐃鈸迎至座前令長敬心施主座前設拜知客揖引入位聽法但受禮坐則慢法也下座拜謝住持若齊僧須與知事議定齊料用費維那實具僧行數目嚫資隨心均俵逼抑令彼退心彼我無益矣僧堂內設施主位於住持分手齊畢住持知事同到客位致謝或寄錢齊僧住持須責付知事盡數辦供俵嚫勿移別用當思因果歷然豈無憂懼昔湖南雲蓋寺智禪師夜坐方丈見一僧項帶鐵枷身纏猛火倚門限告智曰守顒前住此山時因將施主齊僧錢移起僧堂受此苦報望和尚慈悲與某甲齊增填還庶免此罪遂從其請後果得釋楊岐祖師全身塔于茲山
