body:
  text: 朝持犯軌儀三世諸佛歷代祖師嚴淨毗尼弘祖道戒定慧三學也戒是本根由定生慧誓斷一切惡誓修一切善誓度一切衆生秉發三心圓淨戒法小乘四分律病若用藥初説開遮大乘梵網經寧死不犯楞嚴楞伽痛責痛戒法華經云精進持淨戒猶如護明珠問遊方參請慕道參歷叢林務在辦集道具前輩頂笠或者挑包三衣鉢具無虧主丈戒刀合用隨身物件寒暑所需到處挂搭收藏嚴身悉遵規矩身安心樂進道修禪非賢不友非聖不宗圖報四恩莫負自己切宜勉力遺訓昭然道相看名勝相看方丈當在粥罷參前預到侍司侍者接入分坐獻茶略敘來歷而起爐前謝茶即稟云某等特來禮拜和尚輒煩高侍通覆者云少坐詳詢來歷曾與方丈道舊或法眷鄉人辦事者云欵坐少時容某通報即覆住持或官客或迫冗稍緩即須相接侍者令裝香秉燭辦茶報新到住持出寢堂侍者引揖住持接進爐前新到云請和尚趺坐免即插香展具又免即觸禮三拜入座坐侍者燒香點茶敘話起爐前謝茶即送客位還香回禮蓋全賓主之禮須兩展三拜俾相恭敬規示後學即到侍司致謝云適煩神用特此拜謝者云適間禮合何厪降重即回安下客頭請半齋點心參前特為湯湯罷藥石來辰粥了請獻茶別日置管待古法受香禮管待不可遺近來諸方辦事兄弟經行遊覽隨處歇泊住持亦當俯臨報謝盡主禮也垂挂搭歸堂百丈建立之初首到客司相看次往堂司挂搭單位經桉定已後到方丈人事後來叢林鼎盛則不同也初到旦過如客司有榜待請茶湯一併人事在來早請湯相看無榜即到客司衆推熟叢林者為參頭領衆具威儀列門右白云暫到相看知客即接入詞云即日恭惟知賓尊長禪師尊候起居多福久欽道譽獲奉瞻際下情不勝感激之至答云山門多幸特荷遠來揖坐燒香喫茶略詢來歷即起謝茶歸旦過知客尋往回禮參頭接入普問訊知客云移刻恭惟諸位尊長禪師尊候起居多福適承降重特此拜謝下情不勝感激之至答云禮合拜看何勤降重參頭自送出門次詣侍司相看如前禮了稟云某等特來禮拜和尚敢煩侍者通覆侍者當詢來由或鄉人法眷辦事分明侍者云且回安下容某咨覆即上方丈咨覆云某人特來禮拜和尚允已即報相看未允早鐘鳴侍者挑燈詣安下報禮就報相看粥了寢堂相接參頭領衆住持接入參頭進前云請和尚趺坐轉身左手插香退身同衆行禮初展云某等久聞道風此日獲奉尊顏下情不勝感激之至二展寒溫觸禮三拜若入室弟子法眷別香行禮在主者意就坐侍者燒香喫茶問夏在何處鄉裏下字各須實畣不可多語起身爐前謝茶云重承煎點特此拜謝住持送出參頭云和尚尊重隨至侍司致謝云有煩神用敬此拜謝歸旦過外下手排立俟住持回禮同問訊接入詞云移刻恭惟堂頭和尚尊候起居多福適來禮拜不專返辱降重下情不勝感激之至住持云安下不便幸望寬懷衆送出參頭轉上手揖侍者入同衆問訊云移刻伏惟高侍禪師起居多福禮合詣寮拜看返辱降重下情多感者云山門多幸特荷遠臨報謝既遲下情多愧半齋點心當晚特為湯了就座藥石行者燒藥石香一炷若請頭首光伴藥石自起燒香併伴湯行者燒香獻湯住持自伴湯方盡禮也食了報住持送客次日粥了請獻茶參頭領衆排立寢堂前候住持諷經回即趍前問訊云經宿恭惟堂頭和尚尊候起居多福重承寵呼下情不勝感激入座侍者燒香喫茶起至爐前兩展三禮謝茶展云某等重辱煎點特此拜謝下情不勝多愧二展云即日謹時恭惟堂頭和尚尊候起居多福住持送出兩三步參頭回身進住持稟云某等為生死事大無常迅速特來依附和尚伏望收録即普觸禮一拜云謝和尚挂搭若未允衆情先挂搭參頭次第求討允意至侍司附名適奉方丈慈旨令就上寮附名住持須令行者引詣侍司如自到附名侍者回覆方發榜頭下堂司維那令行者請新到茶歸堂上床曆近來叢林寥落禮法不一所合詳列于后拱大相看例於九月初一日預詣侍司附名各備大香一片書兩字名於香上納侍者處近見多處臨相看時參頭率買大香一片得挂搭已却各納香或率錢皆非法也衆推辦事或熟叢林者為參頭至日侍者付香一片與參頭寢堂秉燭裝香衆人排立爐外侍者請住持出參頭進云請和尚趺座方丈垂語參頭下語已退步同衆問訊搜香行兩展三禮詞語並同前語不契機參頭不當先得挂搭即到侍司致謝方丈客頭請來日粥罷就寢堂獻茶住持併在謝挂搭時回禮茶罷送出三兩步參頭回身同衆討挂搭詞云某等為生死事大無常迅速特來依附和尚伏望收録挂搭已歸堂大剎辦事依職書名次第發榜下堂司榜式奉方丈慈旨挂搭一僧某甲侍者某甲上坐今月日侍司某報平大挂搭歸堂堂司承侍司榜頭即令堂司行者請新到茶各懷度牒參頭備香合領衆詣堂司接入對觸禮一拜敘寒溫入座燒香喫茶已起身稟云某等適奉和尚慈旨令依附左右伏望甄録答云山門多幸同守寂寥參頭取度牒付與維那對觸禮一拜衆人上床曆已各還度牒只留參頭度牒行者喝云請衆首座歸堂挂搭參頭領衆前門入堂先舉左足聖僧前排立參頭燒香同衆大展三拜巡堂一匝自上堂至下堂仍如前排立問訊從班尾先移步退立聖僧板頭維那入堂燒香一炷上間立堂司行者用柈袱托度牒維那付還參頭同衆對觸禮一拜參頭領衆自爐前轉上首對觸禮一拜參頭送維那出齋前出後門齋了出前門參頭不出門限維那預發諸寮報榜行者引至衆寮鳴板三下寮主相接入門對觸禮一拜寒暄了人事寮元對觸禮一拜敘寒溫燒香獻茶送出茶頭請云寮元請衆首座今晚就寮獻湯答云就此告免次詣首座寮庫司衆頭首寮人事堂司行者通報相接爐前對觸禮一拜敘寒溫送出今來多不相接傳語非法也蓋謝挂搭時兩班回禮通有拜也侍司無拜回禮亦不拜也榜式挂搭一僧某甲上座今月日堂司某報某州某甲上座某戒侍司申尊住持也前堂衆寮侍者具州戒章小挂搭歸堂冬後歲前不拘時也方丈挂搭已侍司發榜下堂司隨即請茶維那接入觸禮一拜燒香喫茶了稟云某等𫎇和尚令依附左右伏望甄録答云山門多幸同守寂寥取度牒付與維那對觸禮一拜上床曆已維那付度牒還參頭對觸禮一拜各收度牒同到衆寮維那上間入對觸禮一拜對轉對觸禮一拜詞云茲者多幸重辱溫存下情不勝感激之至畣云寮舍不便幸乞寬處參頭送維那出衆出寮外右立堂司庫子鳴寮內小板三下寮主接入對觸禮一拜燒香喫茶謝茶了稟云適𫎇維那令歸上寮依附左右伏望甄録畣云茲者多幸同守寂寥對觸禮一拜參頭轉左對觸禮一拜衆一字列爐前問訊寮主引巡桉一匝仍一字列問訊而散次寮元相接對觸禮一拜敘寒溫燒香獻茶次詣寮舍人事并庫司通有觸禮一拜愛西堂首座挂搭大方西堂名德首座欲作住計語次露意住持當勉留次日請茶了稟云某甲為生死事大特來依棲即觸禮一拜住持當答拜還賓主禮也別日或即會兩班茶住持躬起燒香一炷即復元位立白云某處西堂首座不來此同守寂寥煩兩班相送歸寮受送人即進前云某甲特來依棲重荷甄録住持兩班送歸單寮若辭即𫎇堂亦兩班相送住持居主位對觸禮一拜詞云即日恭惟堂頭和尚起居多福宿生慶幸仰荷收録住持詞云山門多幸同守寂寥送住持出受送人居主揖侍者入作賀送出揖兩班進作賀轉右位與寮主人事詞云宿生多幸且喜同守寂寥答云多幸得獲依附左右即懷香詣方丈謝床位堂司庫子引詣庫司諸頭首寮耆舊寮人事旦望茶並同耆舊列育諸方名勝挂搭相看人事欲求挂搭赴茶罷稟云某等為生死事大特來依附和尚伏望收録普觸禮一拜住持云特荷不同守寂寥即請首座都寺維那喫茶住持躬起燒香一炷白送意如前受送人進云某等重𫎇和尚收録只歸僧堂隨衆答云山門禮當延送即送歸蒙堂住持居主對觸禮一拜送出門即侍者作賀送出進與寮主人事了轉主位立兩班人事了受送人即懷香詣方丈謝榻位堂司行者引至庫司諸頭首人事而已黎法眷辦事挂搭到不拘時先訪侍者詳説來歷令覆住持相看插香行禮若弟姪已下法眷辦事曾執侍者皆當受禮揖香獻茶送客位回禮或歸堂挂搭或送寮舍禮與前同首拋香相看挂搭實迫緣故來不及時或止挂搭或侍者艱阻即拋香相看不拘所在輕置香于住持前云暫到禮拜和尚即觸禮一拜住持或不顧而去隨自收香從此討挂搭不拘時也或問來歷從實祇對俟得挂搭附名歸堂已巡寮人事罷參頭領衆詣堂司致謝就稟云被位鉢位何處安頓即望悅衆不吝慈悲答云謹依來命即同入僧堂指排位次或迫結制添名入圖本若告假須滿堂儀半月或父母師長訃至或迫急幹緣故誠稟公界人然遊方參請志在究明生死如慈明三年易服隨軍伍往見汾陽務猥職而後發明大事癡絶松源會中九個月日方得挂搭今時兄弟朝東暮西豈可同日而語臣謝挂搭叢林盛時挂搭歸堂即時謝挂搭佛照和尚自育王赴徑山權孤雲為入院侍者照尊愛之以謝挂搭禮繁併在夏前報謝也凡來日謝挂搭侍者粥了出榜頭貼衆寮前上間堂司行者寫榜率錢付侍者回香侍司預會茶從衆推一人為參頭至日侍司付大香一片與參頭寢堂嚴設香几爐燭參頭領衆依圖列立三人一引每引一人小參頭詳記詞語進退儀則預須一處習儀庶臨時成現至時侍者同參頭入請住持出廟立參頭歸衆同問訊𣸪進前云請和尚趺坐從爐裏轉復位同衆問訊進爐前懷中取香左手搜香復位同衆問訊參頭同本引三人展具參頭進云某等宿生慶幸獲奉依棲下情不勝榮幸之至再展寒溫觸禮三拜一齊問訊過右邊直接班尾三三趲上禮語同前俟各行禮畢普問訊而退歸衆寮候回禮諸方每謝挂搭普同行禮蓋圖省事後學無聞至理漸寂良可惜也榜式新歸堂兄弟來日粥罷詣方丈謝挂搭今月日侍司某報率香小榜謝挂搭首座各率錢一伯文買香堂司行者某取覆紙長五六寸伏回禮至日謝挂搭方丈客頭堂司庫子各寫回禮榜貼衆寮前方丈榜貼上間兩班下間寢堂謝挂搭了參頭領衆衆寮前下間排立候接住持入寮問訊云移刻恭惟堂頭和尚尊候起居多福禮合拜謝反木降重下情不勝感激之至衆送住持出隨入寮轉上間立參頭接侍者入詞云某等獲依左右茲沐降尊下情不勝感激之至答云拜謝不專下情不勝感激之至參頭送出接兩班入對觸禮一拜還歸堂時一拜也詞語同前衆轉下間副參謝參頭觸禮一拜方丈榜式堂頭和尚粥罷回禮新歸堂首座今月日客頭行者某承準兩班榜式頭首知事粥罷回禮新歸堂首座今月日堂司行者某拜覆戎謝挂搭茶請客侍者照戒臘寫茶狀具雙字名來辰洗面時備卓子筆硯列照堂請各名下書云某甲謹拜尊命如挂搭西堂首座亦依戒次寫入茶狀預晚方丈客頭先持詣寮命僉狀燒香侍者令客頭排位請首座光伴如名德西堂首座與住持對面位參頭次位多處不遜甚至喧聒殊失禮度住持預於升堂時説及蓋受送者先謝挂搭已此同茶也至日齋了鳴鼓集衆燒香侍者揖入住持接敘寒溫次接光伴人問訊詞語尋常茶同各依照牌入位照牌預稟住持看定燒香侍者同請客侍者行禮與結制小座湯禮同次日庫司客頭行者依戒具茶狀列衆寮前請僉名書云某敬依來命狀與方丈同只書下字名庫堂設位首座光伴齋了鳴庫堂前板上首知事與維那行禮同前次日堂司行者具茶狀請僉名與前同照堂排位上首知事光伴鳴照堂板頭首一班行禮或四人六人列位頭問訊如五人前堂首座只燒香中立西班行禮止於知客揖香了燒光伴香就座同茶三日講行此古法也諸方今作一日知事頭首併在早晨僉狀就方丈借座知事頭首下主一位方丈茶鳴鼓知事頭首茶鳴板互為主伴方丈茶衆起謝知事頭首茶只參頭離位謝然貴圖省事非叢林法也方丈狀式新挂搭某甲上座某甲上座今辰齋退就寢堂點茶一中特為伏希雲集今月日侍司某拜請兩班狀式新挂搭某上座某上座右某今辰齋退就某處點茶一中特為伏望衆慈同垂降重今月日首座比丘某知事比丘某拜請
