front:
  text: 外放形骸黜邊幅守禮者莫能與之辨而其從心不踰矩卒有合於自然是則繕性之效略外以理內於斯見之矣淫慾嗔恚皆謂之道大雄氏託言為喻將以語夫上知愚者不察悉得以自恣職教者憂之於是為清規而曲為之防數百年來遵守罔替世愈薄而俗愈侈奇衺美𭦟充滿區宇澤山咸大師始輯廣其未備詢于耆舊證于編簡作備用十卷以拯其極壞其勤苦之志於是書足以見之余甞聞咸師縛律以為禪守其師說不肯以從于人清嚴峻整講道不輟頑薄敬避其死也尤奇偉余愍夫吾儒之教淪弊若是使有若咸師一正之斯得矣序其書所以識吾徒之未能也泰定二年六月清容居士袁桷敘禮於世為大經而人情之節文也沿革損益以趍時故古今之人情得綱常制度以撥道故天地之大經在且吾聖人以波羅提木叉為壽命而百丈清規由是而出此固藂林禮法之大經也然自唐抵今殆五百載風俗屢變人情不同則㳂革損益之說可得已哉近者大川笑翁二祖唱道南北山日用軌則盛於當代至元戊寅依石林和尚於南屏猶得見其遺風餘烈及友雲明西堂出所藏抄本究心訪問編集成帙始此書之作或以為僧受戒首之或以住持入院首之壬午依覺菴先師於承天朝夕扣問因得以祝聖如來降誕二儀冠其前其餘門分類聚釐為十卷然猶未敢以傳學者丙戌夏留雪竇千峰琬西堂論其詳丁亥春溪西澤和尚正其舛得於見聞者稔矣而尚以未身行之為愧壬辰夏首眾雙徑小座湯有位次高下之爭諸方往往廢而不舉愚以西堂一出首座再出都寺三出後堂四出藏主維那知客侍者隨職為位請於雲峰伯父力行焉訖事無敢譁者元貞乙未備員永嘉天寧大德庚子補番易永福乙巳主廬山東林皆行之無易庶幾人情為折中然視古之清規不幾於繁縟乎蓋凷桴土皷不可作於笙鏞間和之秋汙樽杯飲不可施於犧象駢羅之日目曰禪林備用清規備而不用之謂也知我罪我其惟春秋至大辛亥秋廬山東林弌咸書禪林備用清規禪林備用清規卷目于后廬山東林大平興龍禪寺住持比丘弌咸編卷之一天聖節陞座諷經地旦望祝聖陞座玄藏殿祝讚諷經黃朝廷祈禱宇如來降誕宙成道涅槃洪達磨忌荒百丈忌日開山忌月諸祖忌盈嗣法忌送法衣卷之二辰坐禪宿坐參晚參列五日上堂張小參寒入室來告香暑普說往念誦秋四節念誦収請益冬秉拂卷之三藏楞嚴會閏眾寮結夏餘眾寮楞嚴成新挂搭入寮茶歲入夏戒臘茶律挂草單呂出圖帳調排被鉢位陽戒臘牌雲方丈小座湯騰僧堂特為湯四節致結制行禮雨方丈特為首座大眾茶露庫司特為首座大眾茶結首座特為後堂大眾茶為旦望巡堂茶霜講兩巡茶金方丈點行堂茶生頭首點行堂茶麗庫司點行堂茶卷之四水專使請住持玉西堂頭首住持出受請眾請陞座崑西堂頭首受請陞座崗煎點住持當代劒煎點西堂頭首新命號山門管待新命當代專使巨西堂頭首受命管待闕辭眾上堂茶湯珠見職首座西堂次頭首辭眾稱入院古法夜入院新法光請齋果開堂祝壽珍巡寮李特為茶湯柰小參菜檀越陞座重管待專使芥留請兩班薑參訪出入海交割什物卷之五鹹煎點住持河兩班寢堂煎點淡諸山辦事法眷小師煎點鱗尊宿相訪潛諸山法眷尊長嗣法相訪羽官員相訪翔施主請陞座齋僧卷之六龍請立僧首座師請名德首座火兩班進退帝挂鉢請知事鳥侍者進退官方丈特為新舊兩班湯人堂司特為新舊侍者湯茶皇庫司特為新舊兩班湯藥石始送鉢位制管待新舊兩班文住持垂訪點茶字方丈特為新首座茶乃新首座特為後堂大眾茶服交代茶衣入寮出寮茶裳頭首江湖茶推寮主副寮進退位諸莊監収遜頭首寮舍交割什物卷之七國百丈龜鏡文有住持虞前堂陶後堂唐都監寺弔書記民藏主伐維那罪知客周知浴發知殿商侍者燒香書狀請客衣鉢聖僧湯列項職員副寺典座直歲莊主寮元寮主副寮望寮延壽堂主街坊水頭炭頭磨頭園頭樹頭淨頭坐百丈規繩卷之八朝持犯軌儀問遊方參請道相看垂挂搭歸堂拱大相看平大挂搭歸堂章小挂搭歸堂愛西堂首座挂搭育諸方名勝挂搭黎法眷辦事挂搭首拋香相看挂搭臣謝挂搭伏回禮戎謝挂搭茶卷之九羗當代住持涅槃遐遺囑遺書邇入龕念誦壹主喪體請佛事率移龕賓挂真舉哀致祭奠茶湯歸祭次王對靈小參念誦奠茶湯鳴出喪挂真奠茶湯鳳秉炬挂真在入塔樹全身入塔白唱衣駒管待食孝服場上祭資次化念誦入龕初夜宿夜起龕涅槃臺全身入塔法嗣小師被兩班悼住持草遺實式木佛事資次賴估唱衣單式及下遺書萬嗣法師遺書至并遺書式方住持後事葢病僧圓寂此浴亡身諷經髮分剽四請佛事抄劄大鎻龕念誦致祭五出喪常茶毗恭唱衣惟入塔鞠亡僧後事養念誦式保病病重宿夜起龕茶毗唱衣豈口詞敢衣單式毀俵經錢榜式傷三等板帳卷之十女日用清規慕十威儀頌貞日用偈章潔月分標題男百丈沙彌受戒文効新戒參堂才訓童行良行堂普說知警眾法器
